<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hoki POS - Bahan Baku</title>
        <link rel="icon" href="Assets/2.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=DM+Mono:wght@400;500&family=Poppins:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=20260501">
    <style>
    .form-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--r-lg);
        padding: 20px;
        margin-bottom: 12px;
        box-shadow: var(--sh-sm);
    }

    .form-card h3 {
        margin: 0 0 16px;
        font-size: 14px;
        font-weight: 700;
        color: var(--text);
    }

    .grid-form {
        display: grid;
        grid-template-columns: 2fr 1fr 1fr 1fr 1fr auto;
        gap: 10px;
        align-items: end;
    }

    .input-group {
        display: flex;
        flex-direction: column;
        gap: 4px;
    }

    .input-group label {
        font-size: 10px;
        font-weight: 700;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.8px;
    }

    .input-group input {
        margin: 0;
        padding: 9px 12px;
        border: 1.5px solid var(--border);
        border-radius: var(--r-md);
        font-size: 13px;
        font-family: 'Nunito', sans-serif;
        background: var(--surface);
        color: var(--text);
        outline: none;
        transition: border-color 0.2s;
    }

    .input-group input:focus { border-color: var(--red); }
    .input-group input[readonly] {
        background: var(--surface-2);
        color: var(--red);
        font-family: 'DM Mono', monospace;
        font-weight: 700;
    }


    .table-wrap {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--r-lg);
        overflow: hidden;
        box-shadow: var(--sh-sm);
        overflow-x: auto;
    }

    .table-wrap table {
        width: 100%;
        border-collapse: collapse;
    }

    .table-wrap thead th {
        background: var(--red);
        color: white;
        padding: 10px 14px;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        border: none;
        text-align: left;
    }

    .table-wrap tbody td {
        padding: 10px 14px;
        border-bottom: 1px solid var(--border);
        font-size: 13px;
        color: var(--text);
        border-top: none; border-left: none; border-right: none;
    }

    .table-wrap tbody tr:last-child td { border-bottom: none; }
    .table-wrap tbody tr:hover td { background: var(--red-soft); }

    .mono { font-family: 'DM Mono', monospace; font-weight: 700; }
    .red  { color: var(--red); }
    .green { color: var(--green); }



    @media (max-width: 844px) {
        .grid-form { grid-template-columns: 1fr 1fr; }
        .grid-form button { grid-column: span 2; }
    }
    </style>
  <script src="config.js"></script>
</head>
<body>

<aside class="sidebar" id="sidebar">
    <div class="sidebar-brand" onclick="toggleSidebar()">
        <div class="sidebar-logo"><img src="Assets/3.png" alt="Hoki"></div>
        <div class="sidebar-brand-text">
            <div class="sidebar-brand-name">Hoki Dimsum V4.1</div>
            <div class="sidebar-brand-sub">POS System v4.1</div>
        </div>
    </div>
    <button class="sidebar-toggle" onclick="toggleSidebar()">‹</button>
    <nav class="sidebar-nav" id="sidebarNav"></nav>
    <div class="sidebar-user">
        <div class="user-card">
            <div class="user-avatar" id="userAvatarInitial">?</div>
            <div class="user-info">
                <div class="user-name" id="sidebarUserName">Loading...</div>
                <div class="user-role" id="sidebarUserRole">—</div>
            </div>
            <button class="btn-logout-icon" onclick="logout()" title="Logout">🚪</button>
        </div>
    </div>
</aside>

<div class="main-content" id="mainContent">
    <header class="top-header">
        <div class="header-left">
            <div class="header-page-title">🧂 Bahan Baku</div>
        </div>
        <div class="header-right">
            <div class="clock-pill">
                <div id="realtimeClock">00:00:00</div>
                <div id="realtimeDate">...</div>
            </div>
        </div>
    </header>

    <div class="page-body">
        <div class="form-card">
            <h3>➕ Tambah / Edit Bahan Baku</h3>
            <div class="grid-form">
                <div class="input-group">
                    <label>Nama Bahan</label>
                    <input type="text" id="bNama" placeholder="Cth: Mentai, Ayam, Tepung...">
                </div>
                <div class="input-group">
                    <label>Harga (Rp)</label>
                    <input type="number" id="bHarga" placeholder="50000" oninput="hitungHargaSatuan()">
                </div>
                <div class="input-group">
                    <label>Banyak (Qty)</label>
                    <input type="number" id="bBanyak" placeholder="1000" oninput="hitungHargaSatuan()">
                </div>
                <div class="input-group">
                    <label>Satuan</label>
                    <input type="text" id="bSatuan" placeholder="gr / ml / pcs">
                </div>
                <div class="input-group">
                    <label>Harga / Satuan</label>
                    <input type="text" id="bHargaSatuan" readonly placeholder="Auto">
                </div>
                <div class="input-group">
                    <label><input type="checkbox" id="bStokHarian" style="width:auto;"> Audit Stok Harian</label>
                </div>
                <button class="btn-simpan" onclick="simpanBahan()">💾 Simpan</button>
            </div>
        </div>

        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>Nama Bahan</th>
                        <th>Harga</th>
                        <th>Banyak</th>
                        <th>Satuan</th>
                        <th>Harga / Satuan</th>
                        <th>Audit Harian</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="tabelBahan">
                    <tr><td colspan="7" style="text-align:center;padding:32px;color:var(--text-light);">Memuat data...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<nav class="bottom-nav">
    <button class="bn-item" onclick="location.href='dashboard.html'"><span class="bn-icon">🛒</span><span class="bn-label">Kasir</span></button>
    <button class="bn-item" onclick="location.href='history.html'"><span class="bn-icon">📄</span><span class="bn-label">History</span></button>
    <button class="bn-item" onclick="location.href='stok.html'"><span class="bn-icon">📦</span><span class="bn-label">Stok</span></button>
    <button class="bn-item" onclick="location.href='laporan_staff.html'"><span class="bn-icon">🚀</span><span class="bn-label">Laporan</span></button>
    <button class="bn-item active" onclick="openSheet('moreSheet')"><span class="bn-icon">☰</span><span class="bn-label">Lainnya</span></button>
</nav>

<div class="sheet-overlay" id="moreSheet" onclick="closeSheetOutside(event,'moreSheet')">
    <div class="bottom-sheet" onclick="event.stopPropagation()">
        <div class="sheet-handle"></div>
        <p style="font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:14px;">Menu Lainnya</p>
        <div class="more-grid" id="moreGrid"></div>
    </div>
</div>

<script>
const currentUser = JSON.parse(localStorage.getItem('currentUser')) || {user:'Guest', role:'Staff'};
if (!currentUser.user) window.location.href = 'index.html';
if (!['Owner','VIP'].includes(currentUser.role)) window.location.href = 'dashboard.html';

let editId = null;
let allBahan = [];

function toggleSidebar() {
    const sb = document.getElementById('sidebar');
    const mc = document.getElementById('mainContent');
    sb.classList.toggle('collapsed');
    mc.classList.toggle('expanded');
    localStorage.setItem('sidebarState', sb.classList.contains('collapsed') ? 'small' : 'large');
}

function buildSidebar() {
    if (localStorage.getItem('sidebarState') === 'small') {
        document.getElementById('sidebar').classList.add('collapsed');
        document.getElementById('mainContent').classList.add('expanded');
    }
    const role = currentUser.role;
    const cur  = window.location.pathname.split('/').pop() || 'dashboard.html';
    const navItem = (icon, label, link) => {
        const active = cur === link ? 'active' : '';
        return `<button class="nav-item ${active}" onclick="location.href='${link}'">
            <span class="nav-icon">${icon}</span>
            <span class="nav-label">${label}</span>
        </button>`;
    };
    const navItemExternal = (icon, label, url) => {
        return `<button class="nav-item" onclick="window.open('${url}', '_blank')">
            <span class="nav-icon">${icon}</span>
            <span class="nav-label">${label}</span>
        </button>`;
    };
    const PAGES_FRONTLINE = ['kelola-order.html','dashboard.html','history.html','stok.html','restock.html','laporan_staff.html','edukasi.html'];
    const PAGES_MGMT      = ['rekap.html','produk.html'];
    const PAGES_EXEC      = ['laporan.html','statistik.html','promo.html','bahan_baku.html','hpp_produk.html','belanja.html','warehouse.html','salary_staff.html','customer_hoki.html'];
    const PAGES_VIP       = ['user.html','login_history.html'];
    const PAGES_INVESTOR  = ['investor_omset.html','investor_profit.html'];
    const inGroup = pages => pages.includes(cur);
    const getOpen = (id, pages) => {
        const s = localStorage.getItem('navGroup_' + id);
        return s !== null ? s === '1' : true;
    };
    const GROUP_ICONS = { frontline:'🛒', management:'📊', executive:'📋', vip:'👑', investor:'🤝' };
    const navGroup = (id, label, items, pages) => {
        const open      = getOpen(id, pages);
        const hasActive = inGroup(pages);
        const icon      = GROUP_ICONS[id] || '📁';
        return `<div class="nav-group-wrap">
            <button class="nav-group-label${hasActive ? ' has-active' : ''}" onclick="toggleNavGroup('${id}')">
                <span class="nav-group-icon">${icon}</span>
                <span class="nav-group-text">${label}</span>
                <span class="nav-group-ti">${open ? '−' : '+'}</span>
            </button>
            <div class="nav-group-items" id="navg-${id}"${open ? '' : ' style="display:none"'}>
                ${items}
            </div>
        </div>`;
    };

    let frontline = navItem('🔔','Order Online','kelola-order.html')
        + navItem('🛒','Kasir','dashboard.html')
        + navItem('📄','History Transaksi','history.html')
        + navItem('📦','Stok Harian','stok.html')
        + navItem('🚚','Restock Barang','restock.html')
        + navItem('🚀','Laporan Penjualan','laporan_staff.html');
    let edukasiItem = navItem('📚','Edukasi & SOP','edukasi.html');
    frontline += edukasiItem;
    let h = '';
    if (role !== 'Investor') {
        h += navGroup('frontline', 'Frontline', frontline, PAGES_FRONTLINE);
    }

    if (['Senior Staff','SPV','Owner','VIP'].includes(role)) {
        let mgmt = navItem('🗓️','Rekapan Penjualan','rekap.html')
            + navItem('🍱','Master Produk','produk.html');
        h += navGroup('management', 'Management', mgmt, PAGES_MGMT);
    }
    if (['Owner','VIP'].includes(role)) {
        let exec = navItem('📊','Keuangan Global','laporan.html')
            + navItem('📈','Statistik','statistik.html')
            + navItem('🏷️','Promo','promo.html')
            + navItem('🧂','Bahan Baku','bahan_baku.html')
            + navItem('🗃️','HPP Produk','hpp_produk.html')
            + navItem('🏭','Warehouse','warehouse.html')
            + navItem('📝','Belanja','belanja.html')
            + navItem('💵','Salary Staff','salary_staff.html')
            + navItem('👨‍👩‍👦','Customer Hoki','customer_hoki.html');
        h += navGroup('executive', 'Executive', exec, PAGES_EXEC);
    }
    if (['Owner','VIP','Investor'].includes(role)) {
        let inv = navItem('💹','Omset Cabang','investor_omset.html')
            + navItem('💰','Profit Sharing','investor_profit.html');
        h += navGroup('investor', 'Area Investor', inv, PAGES_INVESTOR);
    }
    if (role === 'VIP') {
        let vip = navItem('⚙️','Manajemen User','user.html')
            + navItem('🔑','History Login','login_history.html')
            + navItemExternal('🍱','Menu Order','https://order.pos-hokidimsum.com/admin/dashboard.php');
        h += navGroup('vip', 'VIP Access', vip, PAGES_VIP);
    }
    document.getElementById('sidebarNav').innerHTML = h;
    const name = currentUser.user || '?';
    document.getElementById('userAvatarInitial').innerText = name.charAt(0).toUpperCase();
    document.getElementById('sidebarUserName').innerText   = name;
    document.getElementById('sidebarUserRole').innerText   = role;
}

function toggleNavGroup(id) {
    const items = document.getElementById('navg-' + id);
    const btn   = items.previousElementSibling;
    const ti    = btn.querySelector('.nav-group-ti');
    const open  = items.style.display !== 'none';
    items.style.display = open ? 'none' : '';
    if (ti) ti.textContent = open ? '+' : '−';
    localStorage.setItem('navGroup_' + id, open ? '0' : '1');
}

function updateClock() {
    const now = new Date();
    document.getElementById('realtimeClock').innerText = now.toLocaleTimeString('id-ID');
    document.getElementById('realtimeDate').innerText  = now.toLocaleDateString('id-ID',{weekday:'short',year:'numeric',month:'short',day:'numeric'});
}
setInterval(updateClock, 1000);

function buildMoreMenu() {
    const role = currentUser.role;
    const items = [{icon:'🔔',label:'Order Online',link:'kelola-order.html'}, {icon:'🚚',label:'Restock',link:'restock.html'}];
    items.push({icon:'📚',label:'Edukasi & SOP',link:'edukasi.html'});
    if (['Senior Staff','SPV','Owner','VIP'].includes(role)) {
        items.push({icon:'🍱',label:'Produk',link:'produk.html'});
        items.push({icon:'📈',label:'Rekapan',link:'rekap.html'});
    }
    if (['Owner','VIP'].includes(role)) {
        items.push({icon:'🏷️',label:'Promo',link:'promo.html'});
        items.push({icon:'🧂',label:'Bahan Baku',link:'bahan_baku.html'});
        items.push({icon:'🗃️',label:'HPP Produk',link:'hpp_produk.html'});
        items.push({icon:'🏭',label:'Warehouse',link:'warehouse.html'});
        items.push({icon:'📝',label:'Belanja',link:'belanja.html'});
        items.push({icon:'💵',label:'Salary Staff',link:'salary_staff.html'});
        items.push({icon:'📊',label:'Keuangan',link:'laporan.html'});
        items.push({icon:'📈',label:'Statistik',link:'statistik.html'});
        items.push({icon:'👨‍👩‍👦',label:'Customer Hoki',link:'customer_hoki.html'});
    }
    if (['Owner','VIP','Investor'].includes(role)) {
        items.push({icon:'💹',label:'Omset Cabang',link:'investor_omset.html'});
        items.push({icon:'💰',label:'Profit Sharing',link:'investor_profit.html'});
    }
    if (role === 'VIP') {
        items.push({icon:'⚙️',label:'Users',link:'user.html'});
        items.push({icon:'🔑',label:'Login Log',link:'login_history.html'});
        items.push({icon:'🍱',label:'Menu Order',link:'#',action:"window.open('https://order.pos-hokidimsum.com/admin/dashboard.php','_blank')"});
    }
    items.push({icon:'🚪',label:'Logout',link:'#',action:'logout()'});
    document.getElementById('moreGrid').innerHTML = items.map(i =>
        `<button class="more-btn" onclick="${i.action||`location.href='${i.link}'`}">
            <span class="more-btn-icon">${i.icon}</span>
            <span class="more-btn-label">${i.label}</span>
        </button>`).join('');
}

function openSheet(id) { if(id==='moreSheet') buildMoreMenu(); document.getElementById(id).classList.add('open'); }
function closeSheetOutside(e,id) { if(e.target===document.getElementById(id)) document.getElementById(id).classList.remove('open'); }

function hitungHargaSatuan() {
    const harga  = parseFloat(document.getElementById('bHarga').value) || 0;
    const banyak = parseFloat(document.getElementById('bBanyak').value) || 0;
    const satuan = document.getElementById('bSatuan').value || '';
    if (harga > 0 && banyak > 0) {
        const hs = harga / banyak;
        document.getElementById('bHargaSatuan').value = `Rp ${hs.toLocaleString('id-ID', {minimumFractionDigits:0, maximumFractionDigits:2})} / ${satuan || 'satuan'}`;
    } else {
        document.getElementById('bHargaSatuan').value = '';
    }
}

async function muatBahan() {
    try {
        const res = await fetch(`${API_BASE}?action=get_bahan_baku`);
        allBahan  = await res.json();
        renderTabel();
    } catch(e) { console.error(e); }
}

function renderTabel() {
    const tbody = document.getElementById('tabelBahan');
    if (!allBahan.length) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:32px;color:var(--text-light);">Belum ada data bahan baku</td></tr>';
        return;
    }
    tbody.innerHTML = allBahan.map(b => {
        const hs = parseFloat(b.harga_satuan) || 0;
        const isStokHarian = parseInt(b.is_stok_harian) === 1;
        return `<tr>
            <td><b>${b.nama}</b></td>
            <td class="mono">Rp ${parseFloat(b.harga).toLocaleString('id-ID')}</td>
            <td class="mono">${parseFloat(b.banyak).toLocaleString('id-ID')}</td>
            <td>${b.satuan}</td>
            <td class="mono red">Rp ${hs.toLocaleString('id-ID', {minimumFractionDigits:0, maximumFractionDigits:4})} <small style="color:var(--text-muted);font-weight:400;">/ ${b.satuan}</small></td>
            <td style="text-align:center;">
                <input type="checkbox" ${isStokHarian ? 'checked' : ''} onchange="toggleStokHarian(${b.id}, this.checked)" title="Audit Stok Harian">
            </td>
            <td>
                <button class="btn-edit-icon" onclick="siapkanEdit(${b.id})" title="Edit Data">✏️</button>
                <button class="btn-hapus-icon" onclick="hapusBahan(${b.id})" title="Hapus Data">🗑️</button>
            </td>
        </tr>`;
    }).join('');
}

function siapkanEdit(id) {
    const b = allBahan.find(x => x.id == id);
    if (!b) return;
    editId = id;
    document.getElementById('bNama').value   = b.nama;
    document.getElementById('bHarga').value  = b.harga;
    document.getElementById('bBanyak').value = b.banyak;
    document.getElementById('bSatuan').value = b.satuan;
    document.getElementById('bStokHarian').checked = parseInt(b.is_stok_harian) === 1;
    hitungHargaSatuan();
    window.scrollTo({top:0, behavior:'smooth'});
    document.querySelector('.btn-simpan').innerText = '💾 Update';
}

async function simpanBahan() {
    const nama   = document.getElementById('bNama').value.trim();
    const harga  = parseFloat(document.getElementById('bHarga').value) || 0;
    const banyak = parseFloat(document.getElementById('bBanyak').value) || 0;
    const satuan = document.getElementById('bSatuan').value.trim();
    const isStokHarian = document.getElementById('bStokHarian').checked;

    if (!nama || !harga || !banyak || !satuan) return toast.warning('Lengkapi semua field!');

    const harga_satuan = harga / banyak;
    const payload = { id: editId, nama, harga, banyak, satuan, harga_satuan, is_stok_harian: isStokHarian ? 1 : 0 };

    try {
        const res   = await fetch(`${API_BASE}?action=save_bahan_baku`, {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify(payload)
        });
        const hasil = await res.json();
        if (hasil.status === 'success') {
            toast.success(editId ? 'Bahan diupdate!' : 'Bahan berhasil ditambah!');
            editId = null;
            ['bNama','bHarga','bBanyak','bSatuan','bHargaSatuan'].forEach(id => document.getElementById(id).value = '');
            document.getElementById('bStokHarian').checked = false;
            document.querySelector('.btn-simpan').innerText = '💾 Simpan';
            muatBahan();
        } else {
            toast.error('Gagal menyimpan!');
        }
    } catch(e) { toast.error('Gagal koneksi server!'); }
}

async function toggleStokHarian(id, checked) {
    const b = allBahan.find(x => x.id == id);
    if (!b) return;
    const payload = { id: b.id, nama: b.nama, harga: b.harga, banyak: b.banyak, satuan: b.satuan, harga_satuan: b.harga_satuan, is_stok_harian: checked ? 1 : 0 };
    try {
        const res   = await fetch(`${API_BASE}?action=save_bahan_baku`, {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify(payload)
        });
        const hasil = await res.json();
        if (hasil.status === 'success') {
            b.is_stok_harian = checked ? 1 : 0;
            toast.success(checked ? `${b.nama} ditambahkan ke Audit Stok Harian` : `${b.nama} dihapus dari Audit Stok Harian`);
        } else {
            toast.error('Gagal menyimpan!');
            muatBahan();
        }
    } catch(e) {
        toast.error('Gagal koneksi server!');
        muatBahan();
    }
}

async function hapusBahan(id) {
    const ok = await showConfirm('Hapus bahan ini?', 'Ya, Hapus', 'Batal', '🗑️');
    if (!ok) return;
    try {
        await fetch(`${API_BASE}?action=del_bahan_baku&id=${id}`);
        toast.success('Bahan dihapus!');
        muatBahan();
    } catch(e) { toast.error('Gagal menghapus!'); }
}

async function logout() {
    const ok = await showConfirm('Logout dari sistem?', 'Ya, Logout', 'Batal', '🚪');
    if (ok) {
        localStorage.removeItem('currentUser');
        localStorage.removeItem('cabangHoki');
        window.location.href = 'index.html';
    }
}

window.onload = () => { buildSidebar(); updateClock(); muatBahan(); };
</script>

<script src="session.js"></script>
<script src="toast.js"></script>
</body>
</html>
