<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hoki POS - Customer Hoki</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥟</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&family=DM+Mono:wght@400;500&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=20260501">
    <style>
    .main-content {
        overflow-x: hidden;
    }

    .form-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--r-lg);
        padding: 20px;
        margin-bottom: 12px;
        box-shadow: var(--sh-sm);
    }

    .search-input {
        width: 100%;
        padding: 12px 16px;
        border: 1.5px solid var(--border);
        border-radius: var(--r-md);
        font-size: 14px;
        font-family: 'DM Sans', sans-serif;
        background: var(--surface);
        color: var(--text);
        outline: none;
        transition: border-color 0.2s;
    }

    .search-input:focus { border-color: var(--red); }

    .table-wrap {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--r-lg);
        overflow: hidden;
        box-shadow: var(--sh-sm);
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
    }

    .table-wrap table {
        width: 100%;
        border-collapse: collapse;
        min-width: 600px;
    }

    .table-wrap thead th {
        background: var(--red);
        color: white;
        padding: 8px 10px !important;
        font-size: 11px !important;
        font-weight: 600;
        text-transform: uppercase;
        border: none;
        text-align: left;
    }

    .table-wrap tbody td {
        padding: 8px 10px !important;
        border-bottom: 1px solid var(--border);
        font-size: 12px !important;
        color: var(--text);
        border-top: none; border-left: none; border-right: none;
        vertical-align: top;
    }

    .table-wrap tbody tr:last-child td { border-bottom: none; }
    .table-wrap tbody tr:hover td { background: var(--red-soft); }

    .mono { font-family: 'DM Mono', monospace; font-weight: 700; }
    .bold-number { font-weight: 800; font-size: 13px !important; line-height: 1.2 !important; }
    .zero { color: var(--text-muted); font-weight: 500; }
    .text-total { color: var(--text-muted); font-size: 11px !important; margin-top: 2px; line-height: 1.2 !important; }
    .aksi-group, td:last-child {
        display: flex !important;
        flex-direction: row !important;
        gap: 6px !important;
        align-items: center !important;
        justify-content: center !important;
        white-space: nowrap !important;
    }

    .btn-action, .btn-edit-icon, .btn-hapus-icon {
        width: 28px !important;
        height: 28px !important;
        min-width: 28px !important;
        min-height: 28px !important;
        font-size: 12px !important;
        padding: 0 !important;
        display: inline-flex !important;
        align-items: center !important;
        justify-content: center !important;
        border-radius: 6px !important;
        border: none !important;
        cursor: pointer !important;
        transition: all 0.2s ease !important;
    }

    .btn-action.edit, .btn-edit-icon { background-color: rgba(245, 158, 11, 0.1) !important; color: #D97706 !important; }
    .btn-action.edit:hover, .btn-edit-icon:hover { background-color: #D97706 !important; color: white !important; }
    
    .btn-action.del, .btn-hapus-icon { background-color: rgba(211, 47, 47, 0.1) !important; color: #D32F2F !important; }
    .btn-action.del:hover, .btn-hapus-icon:hover { background-color: #D32F2F !important; color: white !important; }

    /* Modal Edit */
    .modal-pelanggan-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.6);
        backdrop-filter: blur(4px);
        z-index: 9999;
        align-items: center;
        justify-content: center;
    }

    .modal-pelanggan-overlay.open { display: flex; }

    .modal-pelanggan {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--r-lg);
        padding: 28px 24px;
        width: 90%;
        max-width: 380px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        animation: modalFadeIn 0.25s ease;
    }

    @keyframes modalFadeIn {
        from { opacity: 0; transform: translateY(20px) scale(0.95); }
        to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .modal-pelanggan h3 {
        margin: 0 0 18px;
        font-size: 16px;
        font-weight: 800;
        color: var(--text);
        text-align: center;
    }

    .modal-pelanggan input {
        width: 100%;
        padding: 12px 14px;
        border: 1px solid var(--border);
        border-radius: var(--r-md);
        background: var(--surface-2);
        color: var(--text);
        font-family: 'DM Sans', sans-serif;
        font-size: 13px;
        margin-bottom: 10px;
        box-sizing: border-box;
    }

    .modal-pelanggan input:focus {
        outline: none;
        border-color: var(--red);
    }

    .modal-pelanggan-btns {
        display: flex;
        gap: 8px;
        margin-top: 8px;
    }

    .modal-pelanggan-btns button {
        flex: 1;
        padding: 12px;
        border-radius: var(--r-md);
        border: none;
        font-family: 'DM Sans', sans-serif;
        font-weight: 700;
        font-size: 13px;
        cursor: pointer;
        transition: filter 0.15s;
    }

    .modal-pelanggan-btns button:hover { filter: brightness(0.9); }
    .modal-pelanggan-btns .btn-cancel {
        background: var(--surface-2);
        color: var(--text-muted);
        border: 1px solid var(--border);
    }
    .modal-pelanggan-btns .btn-save {
        background: var(--red);
        color: white;
    }

    @media (max-width: 844px) {
        .page-body {
            padding-bottom: 80px;
        }
    }
    </style>
    <script src="config.js"></script>
</head>
<body>

<aside class="sidebar" id="sidebar">
    <div class="sidebar-brand" onclick="toggleSidebar()">
        <div class="sidebar-logo"><img src="Assets/3.png" alt="Hoki"></div>
        <div class="sidebar-brand-text">
            <div class="sidebar-brand-name">Hoki Dimsum</div>
            <div class="sidebar-brand-sub">POS System v3.0</div>
        </div>
    </div>
    <button class="sidebar-toggle" onclick="toggleSidebar()">‹</button>
    <nav class="sidebar-nav" id="sidebarNav"></nav>
    <div class="sidebar-user">
        <div class="user-card">
            <div class="user-avatar" id="userAvatarInitial">?</div>
            <div class="user-info">
                <div class="user-name" id="sidebarUserName">Loading...</div>
                <div class="user-role" id="sidebarUserRole">—</div>
            </div>
            <button class="btn-logout-icon" onclick="logout()" title="Logout">🚪</button>
        </div>
    </div>
</aside>

<div class="main-content" id="mainContent">
    <header class="top-header">
        <div class="header-left">
            <div class="header-page-title">👥 Customer Hoki</div>
        </div>
        <div class="header-right">
            <div class="clock-pill">
                <div id="realtimeClock">00:00:00</div>
                <div id="realtimeDate">...</div>
            </div>
        </div>
    </header>

    <div class="page-body">
        <div class="form-card">
            <input type="text" class="search-input" id="searchCustomer" placeholder="🔍 Cari pelanggan berdasarkan nama / nomor HP..." oninput="filterCustomer()">
        </div>

        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>Nama Pelanggan</th>
                        <th>No. WhatsApp (HP)</th>
                        <th>Loyalitas Belanja</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="tabelCustomer">
                    <tr><td colspan="4" style="text-align:center;padding:32px;color:var(--text-light);">Memuat data pelanggan...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
    <button class="bn-item" onclick="location.href='dashboard.html'"><span class="bn-icon">🛒</span><span class="bn-label">Kasir</span></button>
    <button class="bn-item" onclick="location.href='history.html'"><span class="bn-icon">📄</span><span class="bn-label">History</span></button>
    <button class="bn-item" onclick="location.href='stok.html'"><span class="bn-icon">📦</span><span class="bn-label">Stok</span></button>
    <button class="bn-item" onclick="location.href='laporan_staff.html'"><span class="bn-icon">🚀</span><span class="bn-label">Laporan</span></button>
    <button class="bn-item active" onclick="openSheet('moreSheet')"><span class="bn-icon">☰</span><span class="bn-label">Lainnya</span></button>
</nav>

<!-- More Sheet -->
<div class="sheet-overlay" id="moreSheet" onclick="closeSheetOutside(event, 'moreSheet')">
    <div class="bottom-sheet" onclick="event.stopPropagation()">
        <div class="sheet-handle"></div>
        <div class="bottom-sheet-header">
            <h3>Menu Lainnya</h3>
            <button class="btn-hapus-icon" onclick="document.getElementById('moreSheet').classList.remove('open')" title="Hapus Data">🗑️</button>
        </div>
        <div class="bottom-sheet-body">
            <div class="more-grid" id="moreGrid"></div>
        </div>
    </div>
</div>

<!-- Modal Edit Pelanggan -->
<div class="modal-pelanggan-overlay" id="modalEditPelanggan" onclick="if(event.target===this) this.classList.remove('open')">
    <div class="modal-pelanggan">
        <h3>✏️ Edit Pelanggan</h3>
        <input type="hidden" id="editId">
        <label style="font-size:12px;font-weight:600;color:var(--text-muted);display:block;margin-bottom:4px;">Nama Pelanggan</label>
        <input type="text" id="editNama" placeholder="Nama Lengkap">
        
        <label style="font-size:12px;font-weight:600;color:var(--text-muted);display:block;margin-bottom:4px;margin-top:10px;">No. WhatsApp</label>
        <input type="tel" id="editTelepon" placeholder="08...">
        
        <div class="modal-pelanggan-btns">
            <button class="btn-edit-icon" onclick="document.getElementById('modalEditPelanggan').classList.remove('open')" title="Edit Data">✏️</button>
            <button class="btn-save" onclick="simpanEditPelanggan()">Simpan Perubahan</button>
        </div>
    </div>
</div>

<script>
const currentUser = JSON.parse(localStorage.getItem('currentUser'));
if (!currentUser || !['Owner','VIP'].includes(currentUser.role)) {
    window.location.href = 'dashboard.html';
}

let allCustomers = [];

function toggleSidebar() {
    const sb = document.getElementById('sidebar');
    const mc = document.getElementById('mainContent');
    sb.classList.toggle('collapsed');
    mc.classList.toggle('expanded');
    localStorage.setItem('sidebarState', sb.classList.contains('collapsed') ? 'small' : 'large');
}

function buildSidebar() {
    if (localStorage.getItem('sidebarState') === 'small') {
        document.getElementById('sidebar').classList.add('collapsed');
        document.getElementById('mainContent').classList.add('expanded');
    }
    const role = currentUser.role;
    const cur  = window.location.pathname.split('/').pop() || 'dashboard.html';
    const navItem = (icon, label, link) => {
        const active = cur === link ? 'active' : '';
        return `<button class="nav-item ${active}" onclick="location.href='${link}'">
            <span class="nav-icon">${icon}</span>
            <span class="nav-label">${label}</span>
        </button>`;
    };
    const PAGES_FRONTLINE = ['dashboard.html','history.html','stok.html','restock.html','laporan_staff.html','edukasi.html'];
    const PAGES_MGMT      = ['rekap.html','produk.html'];
    const PAGES_EXEC      = ['laporan.html','statistik.html','bahan_baku.html','hpp_produk.html','belanja.html','warehouse.html','salary_staff.html','customer_hoki.html'];
    const PAGES_VIP       = ['user.html','login_history.html'];
    const PAGES_INVESTOR  = ['investor_omset.html','investor_profit.html'];
    const inGroup = pages => pages.includes(cur);
    const getOpen = (id, pages) => {
        const s = localStorage.getItem('navGroup_' + id);
        return s !== null ? s === '1' : true;
    };
    const GROUP_ICONS = { frontline:'🛒', management:'📊', executive:'📋', vip:'👑', investor:'🤝' };
    const navGroup = (id, label, items, pages) => {
        const open      = getOpen(id, pages);
        const hasActive = inGroup(pages);
        const icon      = GROUP_ICONS[id] || '📁';
        return `<div class="nav-group-wrap">
            <button class="nav-group-label${hasActive ? ' has-active' : ''}" onclick="toggleNavGroup('${id}')">
                <span class="nav-group-icon">${icon}</span>
                <span class="nav-group-text">${label}</span>
                <span class="nav-group-ti">${open ? '−' : '+'}</span>
            </button>
            <div class="nav-group-items" id="navg-${id}"${open ? '' : ' style="display:none"'}>
                ${items}
            </div>
        </div>`;
    };

    let frontline = navItem('🛒','Kasir','dashboard.html')
        + navItem('📄','History Transaksi','history.html')
        + navItem('📦','Stok Harian','stok.html')
        + navItem('🚚','Restock Barang','restock.html')
        + navItem('🚀','Laporan Penjualan','laporan_staff.html');
    let edukasiItem = navItem('📚','Edukasi & SOP','edukasi.html');
    frontline += edukasiItem;
    let h = '';
    if (role !== 'Investor') {
        h += navGroup('frontline', 'Frontline', frontline, PAGES_FRONTLINE);
    }

    if (['Senior Staff','SPV','Owner','VIP'].includes(role)) {
        let mgmt = navItem('🗓️','Rekapan Penjualan','rekap.html')
            + navItem('🍱','Master Produk','produk.html');
        h += navGroup('management', 'Management', mgmt, PAGES_MGMT);
    }
    if (['Owner','VIP'].includes(role)) {
        let exec = navItem('📊','Keuangan Global','laporan.html')
            + navItem('📈','Statistik','statistik.html')
            + navItem('🧂','Bahan Baku','bahan_baku.html')
            + navItem('🗃️','HPP Produk','hpp_produk.html')
            + navItem('🏭','Warehouse','warehouse.html')
            + navItem('📝','Belanja','belanja.html')
            + navItem('💵','Salary Staff','salary_staff.html')
            + navItem('👨‍👩‍👦','Customer Hoki','customer_hoki.html');
        h += navGroup('executive', 'Executive', exec, PAGES_EXEC);
    }
    if (['Owner','VIP','Investor'].includes(role)) {
        let inv = navItem('💹','Omset Cabang','investor_omset.html')
            + navItem('💰','Profit Sharing','investor_profit.html');
        h += navGroup('investor', 'Area Investor', inv, PAGES_INVESTOR);
    }
    if (role === 'VIP') {
        let vip = navItem('⚙️','manajemen User','user.html')
            + navItem('🔑','History Login','login_history.html');
        h += navGroup('vip', 'VIP Access', vip, PAGES_VIP);
    }
    document.getElementById('sidebarNav').innerHTML = h;
    const name = currentUser.user || '?';
    document.getElementById('userAvatarInitial').innerText = name.charAt(0).toUpperCase();
    document.getElementById('sidebarUserName').innerText   = name;
    document.getElementById('sidebarUserRole').innerText   = role;
}

function toggleNavGroup(id) {
    const items = document.getElementById('navg-' + id);
    const btn   = items.previousElementSibling;
    const ti    = btn.querySelector('.nav-group-ti');
    const open  = items.style.display !== 'none';
    items.style.display = open ? 'none' : '';
    if (ti) ti.textContent = open ? '+' : '−';
    localStorage.setItem('navGroup_' + id, open ? '0' : '1');
}

function updateClock() {
    const now = new Date();
    document.getElementById('realtimeClock').innerText = now.toLocaleTimeString('id-ID');
    document.getElementById('realtimeDate').innerText  = now.toLocaleDateString('id-ID',{weekday:'short',year:'numeric',month:'short',day:'numeric'});
}
setInterval(updateClock, 1000);

function buildMoreMenu() {
    const role = currentUser.role;
    const items = [{icon:'🚚',label:'Restock',link:'restock.html'}];
    items.push({icon:'📚',label:'Edukasi & SOP',link:'edukasi.html'});
    if (['Senior Staff','SPV','Owner','VIP'].includes(role)) {
        items.push({icon:'🍱',label:'Produk',link:'produk.html'});
        items.push({icon:'📈',label:'Rekapan',link:'rekap.html'});
    }
    if (['Owner','VIP'].includes(role)) {
        items.push({icon:'🧂',label:'Bahan Baku',link:'bahan_baku.html'});
        items.push({icon:'🗃️',label:'HPP Produk',link:'hpp_produk.html'});
        items.push({icon:'🏭',label:'Warehouse',link:'warehouse.html'});
        items.push({icon:'📝',label:'Belanja',link:'belanja.html'});
        items.push({icon:'💵',label:'Salary Staff',link:'salary_staff.html'});
        items.push({icon:'📊',label:'Keuangan',link:'laporan.html'});
        items.push({icon:'📈',label:'Statistik',link:'statistik.html'});
        items.push({icon:'👨‍👩‍👦',label:'Customer Hoki',link:'customer_hoki.html'});
    }
    if (['Owner','VIP','Investor'].includes(role)) {
        items.push({icon:'💹',label:'Omset Cabang',link:'investor_omset.html'});
        items.push({icon:'💰',label:'Profit Sharing',link:'investor_profit.html'});
    }
    if (role === 'VIP') {
        items.push({icon:'⚙️',label:'Users',link:'user.html'});
        items.push({icon:'🔑',label:'Login Log',link:'login_history.html'});
    }
    items.push({icon:'🚪',label:'Logout',link:'#',action:'logout()'});
    document.getElementById('moreGrid').innerHTML = items.map(i =>
        `<button class="more-btn" onclick="${i.action||`location.href='${i.link}'`}">
            <span class="more-btn-icon">${i.icon}</span>
            <span class="more-btn-label">${i.label}</span>
        </button>`).join('');
}

function openSheet(id) { if(id==='moreSheet') buildMoreMenu(); document.getElementById(id).classList.add('open'); }
function closeSheetOutside(e,id) { if(e.target===document.getElementById(id)) document.getElementById(id).classList.remove('open'); }

async function muatCustomerHoki() {
    try {
        const [resPel, resLoy] = await Promise.all([
            fetch(`${API_BASE}?action=get_pelanggan`),
            fetch(`${API_BASE}?action=get_customer_loyalty`)
        ]);
        const jsonPel = await resPel.json();
        const jsonLoy = await resLoy.json();
        
        if (jsonPel.status === 'success' && jsonLoy.status === 'success') {
            const dataPel = jsonPel.data || [];
            const dataLoy = jsonLoy.data || [];
            
            const loyaltyMap = {};
            dataLoy.forEach(l => {
                if(l.telepon) {
                    loyaltyMap[l.telepon] = {
                        total_order: l.total_order,
                        total_belanja: l.total_belanja
                    };
                }
            });
            
            allCustomers = dataPel.map(p => {
                const lp = loyaltyMap[p.telepon] || { total_order: 0, total_belanja: 0 };
                return {
                    id: p.id,
                    nama: p.nama,
                    telepon: p.telepon,
                    total_order: lp.total_order,
                    total_belanja: lp.total_belanja
                };
            });
            
            renderCustomerHoki();
        } else {
            document.getElementById('tabelCustomer').innerHTML = `<tr><td colspan="4" style="text-align:center;color:var(--red);">Gagal memuat data pelanggan</td></tr>`;
        }
    } catch(e) { 
        console.error(e); 
        document.getElementById('tabelCustomer').innerHTML = `<tr><td colspan="4" style="text-align:center;color:var(--red);">Koneksi server gagal</td></tr>`;
    }
}

function renderCustomerHoki(filterText = '') {
    const tbody = document.getElementById('tabelCustomer');
    
    let filtered = allCustomers;
    if (filterText) {
        const kw = filterText.toLowerCase();
        filtered = allCustomers.filter(p => 
            p.nama.toLowerCase().includes(kw) || 
            (p.telepon && p.telepon.includes(kw))
        );
    }
    
    if (filtered.length === 0) {
        tbody.innerHTML = `<tr><td colspan="4" style="text-align:center;padding:32px;color:var(--text-light);">${filterText ? 'Pelanggan tidak ditemukan' : 'Belum ada data pelanggan'}</td></tr>`;
        return;
    }

    tbody.innerHTML = filtered.map(c => {
        const total = parseInt(c.total_order) || 0;
        const totalBelanja = parseFloat(c.total_belanja) || 0;
        const totalClass = total > 0 ? 'bold-number' : 'bold-number zero';
        
        return `<tr>
            <td><b style="font-size:12px;">${c.nama}</b></td>
            <td class="mono" style="color:var(--text-muted);">${c.telepon || '-'}</td>
            <td>
                <div class="${totalClass}">${total}x Order</div>
                <div class="text-total">Rp ${totalBelanja.toLocaleString('id-ID')}</div>
            </td>
            <td>
                <button class="btn-edit-icon" onclick="siapkanEditPelanggan(${c.id}, '${c.nama}', '${c.telepon}')" title="Edit Data">✏️</button>
                <button class="btn-hapus-icon" onclick="hapusPelanggan(${c.id})" title="Hapus Data">🗑️</button>
            </td>
        </tr>`;
    }).join('');
}

function filterCustomer() {
    const keyword = document.getElementById('searchCustomer').value;
    renderCustomerHoki(keyword);
}

function siapkanEditPelanggan(id, nama, telepon) {
    document.getElementById('editId').value = id;
    document.getElementById('editNama').value = nama;
    document.getElementById('editTelepon').value = telepon;
    document.getElementById('modalEditPelanggan').classList.add('open');
    setTimeout(() => document.getElementById('editNama').focus(), 100);
}

async function simpanEditPelanggan() {
    const id = document.getElementById('editId').value;
    const nama = document.getElementById('editNama').value.trim();
    const telepon = document.getElementById('editTelepon').value.trim();
    
    if (!nama || !telepon) return toast.warning('Nama dan No. HP wajib diisi!');
    
    try {
        const res = await fetch(`${API_BASE}?action=update_pelanggan`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id, nama, telepon })
        });
        const json = await res.json();
        if (json.status === 'success') {
            toast.success('Data pelanggan berhasil diupdate!');
            document.getElementById('modalEditPelanggan').classList.remove('open');
            muatCustomerHoki();
        } else {
            toast.error(json.message || 'Gagal update pelanggan.');
        }
    } catch(e) {
        toast.error('Gagal koneksi ke server.');
    }
}

async function hapusPelanggan(id) {
    const ok = await showConfirm('Hapus pelanggan ini?', 'Ya, Hapus', 'Batal', '🗑️');
    if (!ok) return;
    try {
        const res = await fetch(`${API_BASE}?action=delete_pelanggan&id=${id}`);
        const json = await res.json();
        if (json.status === 'success') {
            toast.success('Pelanggan berhasil dihapus!');
            muatCustomerHoki();
        } else {
            toast.error(json.message || 'Gagal menghapus pelanggan.');
        }
    } catch(e) {
        toast.error('Gagal koneksi ke server.');
    }
}

async function logout() {
    const ok = await showConfirm('Logout dari sistem?', 'Ya, Logout', 'Batal', '🚪');
    if (ok) {
        localStorage.removeItem('currentUser');
        localStorage.removeItem('cabangHoki');
        window.location.href = 'index.html';
    }
}

window.onload = () => { buildSidebar(); updateClock(); muatCustomerHoki(); };
</script>

<script src="session.js"></script>
<script src="toast.js"></script>
</body>
