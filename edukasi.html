<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hoki POS - Edukasi & SOP</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥟</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&family=DM+Mono:wght@400;500&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=20260501">
    <style>
    .main-content { overflow-x: hidden; }

    .form-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--r-lg);
        padding: 20px;
        margin-bottom: 12px;
        box-shadow: var(--sh-sm);
    }

    .form-card h3 {
        margin: 0 0 14px;
        font-size: 15px;
        font-weight: 800;
        color: var(--text);
    }

    .form-row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: flex-end;
    }

    .form-group {
        flex: 1;
        min-width: 180px;
    }

    .form-group label {
        display: block;
        font-size: 11px;
        font-weight: 600;
        color: var(--text-muted);
        margin-bottom: 4px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    .form-group input,
    .form-group select {
        width: 100%;
        padding: 10px 12px;
        border: 1.5px solid var(--border);
        border-radius: var(--r-md);
        font-size: 13px;
        font-family: 'DM Sans', sans-serif;
        background: var(--surface);
        color: var(--text);
        outline: none;
        box-sizing: border-box;
        transition: border-color 0.2s;
    }

    .form-group input:focus,
    .form-group select:focus { border-color: var(--red); }

    .btn-tambah {
        background: var(--red);
        color: white;
        border: none;
        padding: 10px 18px;
        border-radius: var(--r-md);
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        white-space: nowrap;
        font-family: 'DM Sans', sans-serif;
        transition: filter 0.15s;
    }
    .btn-tambah:hover { filter: brightness(0.9); }

    .table-wrap {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--r-lg);
        overflow: hidden;
        box-shadow: var(--sh-sm);
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
    }

    .table-wrap table {
        width: 100%;
        border-collapse: collapse;
        min-width: 500px;
    }

    .table-wrap thead th {
        background: var(--red);
        color: white;
        padding: 8px 10px !important;
        font-size: 11px !important;
        font-weight: 600;
        text-transform: uppercase;
        border: none;
        text-align: left;
    }

    .table-wrap tbody td {
        padding: 8px 10px !important;
        border-bottom: 1px solid var(--border);
        font-size: 12px !important;
        color: var(--text);
        border-top: none; border-left: none; border-right: none;
        vertical-align: middle;
    }

    .table-wrap tbody tr:last-child td { border-bottom: none; }
    .table-wrap tbody tr:hover td { background: var(--red-soft); }

    .badge-kategori {
        display: inline-block;
        padding: 3px 8px;
        border-radius: 4px;
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.3px;
        background: var(--surface-2);
        color: var(--text-muted);
    }
    .badge-kategori.kasir { background: rgba(25,118,210,0.1); color: #1976d2; }
    .badge-kategori.dapur { background: rgba(230,81,0,0.1); color: #e65100; }
    .badge-kategori.produk { background: rgba(46,125,50,0.1); color: #2e7d32; }

    td:last-child {
        white-space: nowrap !important;
    }

    /* ── PDF Viewer Modal ── */
    .modal-pdf-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.7);
        backdrop-filter: blur(4px);
        z-index: 9999;
        align-items: center;
        justify-content: center;
    }
    .modal-pdf-overlay.open { display: flex; }

    .modal-pdf {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--r-lg);
        width: 95%;
        max-width: 900px;
        height: 85vh;
        display: flex;
        flex-direction: column;
        box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        animation: modalFadeIn 0.25s ease;
        overflow: hidden;
    }

    @keyframes modalFadeIn {
        from { opacity: 0; transform: translateY(20px) scale(0.95); }
        to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .modal-pdf-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 18px;
        border-bottom: 1px solid var(--border);
    }

    .modal-pdf-header h3 {
        margin: 0;
        font-size: 14px;
        font-weight: 800;
        color: var(--text);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        max-width: calc(100% - 80px);
    }

    .modal-pdf-close {
        background: none;
        border: none;
        font-size: 20px;
        cursor: pointer;
        color: var(--text-muted);
        padding: 4px 8px;
        border-radius: 6px;
        transition: background 0.2s;
    }
    .modal-pdf-close:hover { background: var(--surface-2); }

    .modal-pdf iframe {
        flex: 1;
        width: 100%;
        border: none;
    }

    @media (max-width: 844px) {
        .page-body { padding-bottom: 80px; }
        .modal-pdf { width: 100%; max-width: 100%; height: 100vh; border-radius: 0; }
        .form-row { flex-direction: column; }
        .form-group { min-width: unset; }
    }
    </style>
    <script src="config.js"></script>
</head>
<body>

<aside class="sidebar" id="sidebar">
    <div class="sidebar-brand" onclick="toggleSidebar()">
        <div class="sidebar-logo"><img src="Assets/3.png" alt="Hoki"></div>
        <div class="sidebar-brand-text">
            <div class="sidebar-brand-name">Hoki Dimsum</div>
            <div class="sidebar-brand-sub">POS System v3.0</div>
        </div>
    </div>
    <button class="sidebar-toggle" onclick="toggleSidebar()">‹</button>
    <nav class="sidebar-nav" id="sidebarNav"></nav>
    <div class="sidebar-user">
        <div class="user-card">
            <div class="user-avatar" id="userAvatarInitial">?</div>
            <div class="user-info">
                <div class="user-name" id="sidebarUserName">Loading...</div>
                <div class="user-role" id="sidebarUserRole">—</div>
            </div>
            <button class="btn-logout-icon" onclick="logout()" title="Logout">🚪</button>
        </div>
    </div>
</aside>

<div class="main-content" id="mainContent">
    <header class="top-header">
        <div class="header-left">
            <div class="header-page-title">📚 Edukasi & SOP</div>
        </div>
        <div class="header-right">
            <div class="clock-pill">
                <div id="realtimeClock">00:00:00</div>
                <div id="realtimeDate">...</div>
            </div>
        </div>
    </header>

    <div class="page-body">

        <!-- Form Tambah (VIP Only) -->
        <div class="form-card" id="formTambahEdukasi" style="display:none;">
            <h3>➕ Tambah Materi SOP</h3>
            <div class="form-row">
                <div class="form-group">
                    <label>Judul Materi</label>
                    <input type="text" id="inputJudul" placeholder="Contoh: SOP Buka Outlet Pagi">
                </div>
                <div class="form-group" style="max-width:200px;">
                    <label>Kategori</label>
                    <select id="inputKategori">
                        <option value="SOP Kasir">SOP Kasir</option>
                        <option value="SOP Dapur">SOP Dapur</option>
                        <option value="Standard Produk">Standard Produk</option>
                        <option value="SOP Umum">SOP Umum</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>URL File PDF</label>
                    <input type="url" id="inputUrl" placeholder="https://drive.google.com/file/d/...">
                </div>
                <div class="form-group" style="flex:0;">
                    <label style="visibility:hidden;">x</label>
                    <button class="btn-tambah" onclick="simpanEdukasi()">💾 Simpan</button>
                </div>
            </div>
        </div>

        <!-- Tabel List Dokumen -->
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>Judul Materi</th>
                        <th>Kategori</th>
                        <th>Diunggah Oleh</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="tabelEdukasi">
                    <tr><td colspan="4" style="text-align:center;padding:32px;color:var(--text-light);">Memuat dokumen edukasi...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- PDF Viewer Modal -->
<div class="modal-pdf-overlay" id="modalPdfViewer" onclick="if(event.target===this) this.classList.remove('open')">
    <div class="modal-pdf">
        <div class="modal-pdf-header">
            <h3 id="pdfViewerTitle">Dokumen</h3>
            <button class="modal-pdf-close" onclick="document.getElementById('modalPdfViewer').classList.remove('open')">✕</button>
        </div>
        <iframe id="pdfViewerFrame" src="about:blank"></iframe>
    </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
    <button class="bn-item" onclick="location.href='dashboard.html'"><span class="bn-icon">🛒</span><span class="bn-label">Kasir</span></button>
    <button class="bn-item" onclick="location.href='history.html'"><span class="bn-icon">📄</span><span class="bn-label">History</span></button>
    <button class="bn-item" onclick="location.href='stok.html'"><span class="bn-icon">📦</span><span class="bn-label">Stok</span></button>
    <button class="bn-item" onclick="location.href='laporan_staff.html'"><span class="bn-icon">🚀</span><span class="bn-label">Laporan</span></button>
    <button class="bn-item active" onclick="openSheet('moreSheet')"><span class="bn-icon">☰</span><span class="bn-label">Lainnya</span></button>
</nav>

<!-- More Sheet -->
<div class="sheet-overlay" id="moreSheet" onclick="closeSheetOutside(event, 'moreSheet')">
    <div class="bottom-sheet" onclick="event.stopPropagation()">
        <div class="sheet-handle"></div>
        <p style="font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:14px;">Menu Lainnya</p>
        <div class="more-grid" id="moreGrid"></div>
    </div>
</div>

<script>
const currentUser = JSON.parse(localStorage.getItem('currentUser')) || {user:'Guest', role:'Staff', cabang:''};
if (!currentUser.user) window.location.href = 'index.html';

/* ── SIDEBAR ── */
function toggleSidebar() {
    const sb = document.getElementById('sidebar');
    const mc = document.getElementById('mainContent');
    sb.classList.toggle('collapsed');
    mc.classList.toggle('expanded');
    localStorage.setItem('sidebarState', sb.classList.contains('collapsed') ? 'small' : 'large');
}

function buildSidebar() {
    if (localStorage.getItem('sidebarState') === 'small') {
        document.getElementById('sidebar').classList.add('collapsed');
        document.getElementById('mainContent').classList.add('expanded');
    }
    const role = currentUser.role;
    const cur  = window.location.pathname.split('/').pop() || 'dashboard.html';
    const navItem = (icon, label, link) => {
        const active = cur === link ? 'active' : '';
        return `<button class="nav-item ${active}" onclick="location.href='${link}'">
            <span class="nav-icon">${icon}</span>
            <span class="nav-label">${label}</span>
        </button>`;
    };
    const PAGES_FRONTLINE = ['dashboard.html','history.html','stok.html','restock.html','laporan_staff.html','edukasi.html'];
    const PAGES_MGMT      = ['rekap.html','produk.html'];
    const PAGES_EXEC      = ['laporan.html','statistik.html','bahan_baku.html','hpp_produk.html','belanja.html','warehouse.html','salary_staff.html','customer_hoki.html'];
    const PAGES_VIP       = ['user.html','login_history.html'];
    const PAGES_INVESTOR  = ['investor_omset.html','investor_profit.html'];
    const inGroup = pages => pages.includes(cur);
    const getOpen = (id, pages) => {
        const s = localStorage.getItem('navGroup_' + id);
        return s !== null ? s === '1' : true;
    };
    const GROUP_ICONS = { frontline:'🛒', management:'📊', executive:'📋', vip:'👑', investor:'🤝' };
    const navGroup = (id, label, items, pages) => {
        const open      = getOpen(id, pages);
        const hasActive = inGroup(pages);
        const icon      = GROUP_ICONS[id] || '📁';
        return `<div class="nav-group-wrap">
            <button class="nav-group-label${hasActive ? ' has-active' : ''}" onclick="toggleNavGroup('${id}')">
                <span class="nav-group-icon">${icon}</span>
                <span class="nav-group-text">${label}</span>
                <span class="nav-group-ti">${open ? '−' : '+'}</span>
            </button>
            <div class="nav-group-items" id="navg-${id}"${open ? '' : ' style="display:none"'}>
                ${items}
            </div>
        </div>`;
    };

    let frontline = navItem('🛒','Kasir','dashboard.html')
        + navItem('📄','History Transaksi','history.html')
        + navItem('📦','Stok Harian','stok.html')
        + navItem('🚚','Restock Barang','restock.html')
        + navItem('🚀','Laporan Penjualan','laporan_staff.html')
        + navItem('📚','Edukasi & SOP','edukasi.html');
    let h = '';
    if (role !== 'Investor') {
        h += navGroup('frontline', 'Frontline', frontline, PAGES_FRONTLINE);
    }

    if (['Senior Staff','SPV','Owner','VIP'].includes(role)) {
        let mgmt = navItem('🗓️','Rekapan Penjualan','rekap.html')
            + navItem('🍱','Master Produk','produk.html');
        h += navGroup('management', 'Management', mgmt, PAGES_MGMT);
    }
    if (['Owner','VIP'].includes(role)) {
        let exec = navItem('📊','Keuangan Global','laporan.html')
            + navItem('📈','Statistik','statistik.html')
            + navItem('🧂','Bahan Baku','bahan_baku.html')
            + navItem('🗃️','HPP Produk','hpp_produk.html')
            + navItem('🏭','Warehouse','warehouse.html')
            + navItem('📝','Belanja','belanja.html')
            + navItem('💵','Salary Staff','salary_staff.html')
            + navItem('👨‍👩‍👦','Customer Hoki','customer_hoki.html');
        h += navGroup('executive', 'Executive', exec, PAGES_EXEC);
    }
    if (['Owner','VIP','Investor'].includes(role)) {
        let inv = navItem('💹','Omset Cabang','investor_omset.html')
            + navItem('💰','Profit Sharing','investor_profit.html');
        h += navGroup('investor', 'Area Investor', inv, PAGES_INVESTOR);
    }
    if (role === 'VIP') {
        let vip = navItem('⚙️','manajemen User','user.html')
            + navItem('🔑','History Login','login_history.html');
        h += navGroup('vip', 'VIP Access', vip, PAGES_VIP);
    }
    document.getElementById('sidebarNav').innerHTML = h;
    const name = currentUser.user || '?';
    document.getElementById('userAvatarInitial').innerText = name.charAt(0).toUpperCase();
    document.getElementById('sidebarUserName').innerText   = name;
    document.getElementById('sidebarUserRole').innerText   = role;
}

function toggleNavGroup(id) {
    const items = document.getElementById('navg-' + id);
    const btn   = items.previousElementSibling;
    const ti    = btn.querySelector('.nav-group-ti');
    const open  = items.style.display !== 'none';
    items.style.display = open ? 'none' : '';
    if (ti) ti.textContent = open ? '+' : '−';
    localStorage.setItem('navGroup_' + id, open ? '0' : '1');
}

function updateClock() {
    const now = new Date();
    document.getElementById('realtimeClock').innerText = now.toLocaleTimeString('id-ID');
    document.getElementById('realtimeDate').innerText  = now.toLocaleDateString('id-ID',{weekday:'short',year:'numeric',month:'short',day:'numeric'});
}
setInterval(updateClock, 1000);

function buildMoreMenu() {
    const role = currentUser.role;
    const items = [
        {icon:'🚚',label:'Restock',link:'restock.html'},
        {icon:'📚',label:'Edukasi & SOP',link:'edukasi.html'}
    ];
    if (['Senior Staff','SPV','Owner','VIP'].includes(role)) {
        items.push({icon:'🍱',label:'Produk',link:'produk.html'});
        items.push({icon:'📈',label:'Rekapan',link:'rekap.html'});
    }
    if (['Owner','VIP'].includes(role)) {
        items.push({icon:'🧂',label:'Bahan Baku',link:'bahan_baku.html'});
        items.push({icon:'🗃️',label:'HPP Produk',link:'hpp_produk.html'});
        items.push({icon:'🏭',label:'Warehouse',link:'warehouse.html'});
        items.push({icon:'📝',label:'Belanja',link:'belanja.html'});
        items.push({icon:'💵',label:'Salary Staff',link:'salary_staff.html'});
        items.push({icon:'📊',label:'Keuangan',link:'laporan.html'});
        items.push({icon:'📈',label:'Statistik',link:'statistik.html'});
        items.push({icon:'👨‍👩‍👦',label:'Customer Hoki',link:'customer_hoki.html'});
    }
    if (['Owner','VIP','Investor'].includes(role)) {
        items.push({icon:'💹',label:'Omset Cabang',link:'investor_omset.html'});
        items.push({icon:'💰',label:'Profit Sharing',link:'investor_profit.html'});
    }
    if (role === 'VIP') {
        items.push({icon:'⚙️',label:'Users',link:'user.html'});
        items.push({icon:'🔑',label:'Login Log',link:'login_history.html'});
    }
    items.push({icon:'🚪',label:'Logout',link:'#',action:'logout()'});
    document.getElementById('moreGrid').innerHTML = items.map(i =>
        `<button class="more-btn" onclick="${i.action||`location.href='${i.link}'`}">
            <span class="more-btn-icon">${i.icon}</span>
            <span class="more-btn-label">${i.label}</span>
        </button>`).join('');
}

function openSheet(id) { if(id==='moreSheet') buildMoreMenu(); document.getElementById(id).classList.add('open'); }
function closeSheetOutside(e,id) { if(e.target===document.getElementById(id)) document.getElementById(id).classList.remove('open'); }

/* ── DATA EDUKASI ── */
async function muatEdukasi() {
    const tbody = document.getElementById('tabelEdukasi');
    tbody.innerHTML = `<tr><td colspan="4" style="text-align:center;padding:24px;color:var(--text-light);">Memuat dokumen...</td></tr>`;
    try {
        const res = await fetch(`${API_BASE}?action=get_edukasi`);
        const json = await res.json();
        if (json.status === 'success' && json.data.length > 0) {
            tbody.innerHTML = json.data.map(d => {
                let badgeClass = '';
                const kat = (d.kategori || '').toLowerCase();
                if (kat.includes('kasir')) badgeClass = 'kasir';
                else if (kat.includes('dapur')) badgeClass = 'dapur';
                else if (kat.includes('produk')) badgeClass = 'produk';

                let aksiHtml = `
                    <button class="btn-detail-icon" onclick="viewPdf('${encodeURIComponent(d.url_pdf)}','${d.judul.replace(/'/g,"\\&#39;")}')" title="Lihat Dokumen">👁️</button>
                    <button class="btn-edit-icon" onclick="window.open(decodeURIComponent('${encodeURIComponent(d.url_pdf)}'),'_blank')" title="Download">📥</button>`;
                if (currentUser.role === 'VIP') {
                    aksiHtml += ` <button class="btn-hapus-icon" onclick="hapusEdukasi(${d.id})" title="Hapus Dokumen">🗑️</button>`;
                }

                return `<tr>
                    <td><b>${d.judul}</b></td>
                    <td><span class="badge-kategori ${badgeClass}">${d.kategori}</span></td>
                    <td style="color:var(--text-muted);font-size:11px;">${d.uploaded_by || '-'}</td>
                    <td>${aksiHtml}</td>
                </tr>`;
            }).join('');
        } else {
            tbody.innerHTML = `<tr><td colspan="4" style="text-align:center;padding:32px;color:var(--text-light);">Belum ada dokumen edukasi</td></tr>`;
        }
    } catch(e) {
        console.error('muatEdukasi:', e);
        tbody.innerHTML = `<tr><td colspan="4" style="text-align:center;padding:24px;color:var(--red);">Gagal memuat data</td></tr>`;
    }
}

function viewPdf(encodedUrl, title) {
    let url = decodeURIComponent(encodedUrl);
    
    // Auto-Convert Google Drive URL to Embeddable Preview
    if (url.includes('drive.google.com') && url.includes('/d/')) {
        const match = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
        if (match) {
            url = `https://drive.google.com/file/d/${match[1]}/preview`;
        }
    } else if (!url.includes('drive.google.com')) {
        url = url + '#toolbar=1';
    }

    document.getElementById('pdfViewerTitle').textContent = title;
    document.getElementById('pdfViewerFrame').src = url;
    document.getElementById('modalPdfViewer').classList.add('open');
}

async function simpanEdukasi() {
    const judul = document.getElementById('inputJudul').value.trim();
    const kategori = document.getElementById('inputKategori').value;
    const url_pdf = document.getElementById('inputUrl').value.trim();

    if (!judul || !url_pdf) return toast.warning('Judul dan URL PDF wajib diisi!');

    try {
        const res = await fetch(`${API_BASE}?action=save_edukasi`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ judul, kategori, url_pdf, uploaded_by: currentUser.user })
        });
        const json = await res.json();
        if (json.status === 'success') {
            toast.success('Dokumen berhasil ditambahkan!');
            document.getElementById('inputJudul').value = '';
            document.getElementById('inputUrl').value = '';
            muatEdukasi();
        } else {
            toast.error(json.message || 'Gagal menyimpan dokumen.');
        }
    } catch(e) {
        toast.error('Gagal koneksi ke server.');
    }
}

async function hapusEdukasi(id) {
    const ok = await showConfirm('Hapus dokumen ini dari pustaka?', 'Ya, Hapus', 'Batal', '🗑️');
    if (!ok) return;
    try {
        const res = await fetch(`${API_BASE}?action=del_edukasi&id=${id}&role=${currentUser.role}`);
        const json = await res.json();
        if (json.status === 'success') {
            toast.success('Dokumen berhasil dihapus!');
            muatEdukasi();
        } else {
            toast.error(json.message || 'Gagal menghapus dokumen.');
        }
    } catch(e) {
        toast.error('Gagal koneksi ke server.');
    }
}

async function logout() {
    const ok = await showConfirm('Logout dari sistem?', 'Ya, Logout', 'Batal', '🚪');
    if (ok) {
        localStorage.removeItem('currentUser');
        localStorage.removeItem('cabangHoki');
        window.location.href = 'index.html';
    }
}

window.onload = () => {
    buildSidebar();
    updateClock();

    // Tampilkan form tambah hanya untuk VIP
    if (currentUser.role === 'VIP') {
        document.getElementById('formTambahEdukasi').style.display = '';
    }

    muatEdukasi();
};
</script>
