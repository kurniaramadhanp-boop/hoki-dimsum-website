<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hoki POS - History Transaksi</title>
        <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥟</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&family=DM+Mono:wght@400;500&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=20260501">
    <style>

    /* ── FILTER BAR ── */
    /* filter-bar dihandle style.css global */

    .filter-group {
        display: flex;
        flex-direction: column;
        gap: 4px;
        flex: 1;
        min-width: 120px;
    }

    .filter-group label {
        font-size: 10px;
        font-weight: 700;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.8px;
        white-space: nowrap;
    }

    .filter-group input {
        height: 40px;
        padding: 0 12px;
        border: 1.5px solid var(--border);
        border-radius: var(--r-md);
        font-size: 13px;
        color: var(--text);
        background: var(--surface);
        outline: none;
        width: 100%;
        font-family: 'DM Sans', sans-serif;
        transition: border-color var(--ease);
    }

    .filter-group input:focus {
        border-color: var(--red);
        box-shadow: 0 0 0 3px rgba(211,47,47,0.08);
    }

    /* custom dropdown override */
    .filter-group .custom-select-wrap {
        margin-bottom: 0;
    }

    .filter-group .custom-select-btn {
        height: 40px;
        padding: 0 12px;
        border-radius: var(--r-md);
        border-width: 1.5px;
        font-size: 13px;
        font-weight: 500;
    }

    /* ── TABLE ── */
    .table-wrap {
        background: var(--surface);
        border-radius: var(--r-lg);
        border: 1px solid var(--border);
        box-shadow: var(--sh-sm);
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
    }

    .table-wrap table {
        border-radius: 0;
        box-shadow: none;
        border: none;
        min-width: 750px;
    }

    .waktu-text {
        font-family: 'DM Mono', monospace;
        font-size: 11px;
        color: var(--text-muted);
        display: flex;
        flex-direction: column;
        gap: 1px;
        white-space: nowrap;
    }
    .total-text   { font-family: 'DM Mono', monospace; font-weight: 700; color: var(--red); }
    .item-text    { font-size: 12px; color: var(--text-muted); }
    .cabang-text { font-weight: 700; color: var(--text); }
    .pelanggan-member { font-weight: 700; color: var(--text); font-size: 12px; }
    .pelanggan-nonmember { font-style: italic; color: var(--text-muted); opacity: 0.65; font-size: 12px; }

    .tag-metode {
        background: var(--surface-2);
        color: var(--text-muted);
        border: 1px solid var(--border);
        padding: 3px 10px;
        border-radius: 99px;
        font-size: 11px;
        font-weight: 700;
    }

    /* ── RESPONSIVE MOBILE ── */
    @media (max-width: 844px) {

        .table-wrap table { min-width: 780px; }

    }


    /* ── INFO BAR SIMPLE ── */
    .info-bar-simple {
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        padding: 0 24px;
        display: flex;
        align-items: center;
        height: 40px;
        flex-shrink: 0;
    }

    .ib-item {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 0 16px;
        height: 100%;
    }

    .ib-item:first-child { padding-left: 0; }

    .ib-divider {
        width: 1px;
        height: 20px;
        background: var(--border);
        flex-shrink: 0;
    }

    .ib-label {
        font-size: 11px;
        color: var(--text-light);
        font-weight: 500;
        white-space: nowrap;
    }

    .ib-val {
        font-size: 12px;
        font-weight: 700;
        color: var(--text);
        white-space: nowrap;
    }

    @media (max-width: 844px) {
        .info-bar-simple { padding: 6px 14px; height: auto; gap: 16px; }
        .ib-item { padding: 0; }
    }
    </style>
  <script src="config.js"></script>
</head>
<body>

<!-- ── SIDEBAR ── -->
<aside class="sidebar" id="sidebar">
    <div class="sidebar-brand" onclick="toggleSidebar()">
        <div class="sidebar-logo">
            <img src="Assets/3.png" alt="Hoki">
        </div>
        <div class="sidebar-brand-text">
            <div class="sidebar-brand-name">Hoki Dimsum</div>
            <div class="sidebar-brand-sub">POS System v3.0</div>
        </div>
    </div>
    <button class="sidebar-toggle" onclick="toggleSidebar()">‹</button>
    <nav class="sidebar-nav" id="sidebarNav"></nav>
    <div class="sidebar-user">
        <div class="user-card">
            <div class="user-avatar" id="userAvatarInitial">?</div>
            <div class="user-info">
                <div class="user-name" id="sidebarUserName">Loading...</div>
                <div class="user-role" id="sidebarUserRole">—</div>
            </div>
            <button class="btn-logout-icon" onclick="logout()" title="Logout">🚪</button>
        </div>
    </div>
</aside>

<!-- ── MAIN CONTENT ── -->
<div class="main-content" id="mainContent">

    <header class="top-header">
        <div class="header-left">
            <div class="header-page-title">📄 History Transaksi</div>
        </div>
        <div class="header-right">
            <div class="clock-pill">
                <div id="realtimeClock">00:00:00</div>
                <div id="realtimeDate">...</div>
            </div>
        </div>
    </header>

    <!-- INFO BAR -->
    <div class="info-bar-simple">
        <div class="ib-item"><span class="ib-label">👤 Petugas</span><span class="ib-val" id="infoPetugas">—</span></div>
        <div class="ib-divider"></div>
        <div class="ib-item"><span class="ib-label">📍 Cabang</span><span class="ib-val" id="infoCabang">—</span></div>
    </div>

    <div class="page-body">
        <!-- FILTER -->
        <div class="filter-bar">
            <div class="filter-group">
                <label for="tglMulai">Mulai</label>
                <input type="date" id="tglMulai">
            </div>
            <div class="filter-group">
                <label for="tglSelesai">Sampai</label>
                <input type="date" id="tglSelesai">
            </div>
            <div class="filter-group">
                <label>Cabang</label>
                <div class="custom-select-wrap" id="selectCabangWrap">
                    <button class="custom-select-btn" onclick="toggleDropdownCabang()">
                        <span id="selectedCabangLabel">Semua Cabang</span>
                        <svg width="12" height="8" viewBox="0 0 12 8" fill="none">
                            <path d="M1 1l5 5 5-5" stroke="#d32f2f" stroke-width="1.5" stroke-linecap="round"/>
                        </svg>
                    </button>
                    <div class="custom-dropdown" id="dropdownCabang"></div>
                </div>
            </div>
            <button class="btn-cari"      onclick="renderHistory()">🔍 Cari</button>
            <button class="btn-hari-ini"  onclick="filterHariIni()">📅 Hari Ini</button>
            <button class="btn-kosongkan" id="btnKosongkan" onclick="kosongkanFilter()">⚠️ Reset</button>
        </div>

        <!-- TABLE -->
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>Waktu</th>
                        <th>Petugas</th>
                        <th>Pelanggan</th>
                        <th>Cabang</th>
                        <th>Item</th>
                        <th>Total</th>
                        <th>Metode</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="tabelHistory">
                    <tr>
                        <td colspan="8">
                            <div class="empty-state">
                                <span class="icon">📄</span>
                                <p>Belum ada data transaksi</p>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
    <button class="bn-item" onclick="location.href='dashboard.html'"><span class="bn-icon">🛒</span><span class="bn-label">Kasir</span></button>
    <button class="bn-item active"><span class="bn-icon">📄</span><span class="bn-label">History</span></button>
    <button class="bn-item" onclick="location.href='stok.html'"><span class="bn-icon">📦</span><span class="bn-label">Stok</span></button>
    <button class="bn-item" onclick="location.href='laporan_staff.html'"><span class="bn-icon">🚀</span><span class="bn-label">Laporan</span></button>
    <button class="bn-item" onclick="openSheet('moreSheet')"><span class="bn-icon">☰</span><span class="bn-label">Lainnya</span></button>
</nav>

<!-- MORE SHEET -->
<div class="sheet-overlay" id="moreSheet" onclick="closeSheetOutside(event,'moreSheet')">
    <div class="bottom-sheet" onclick="event.stopPropagation()">
        <div class="sheet-handle"></div>
        <p style="font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:14px;">Menu Lainnya</p>
        <div class="more-grid" id="moreGrid"></div>
    </div>
</div>

<script>
const currentUser = JSON.parse(localStorage.getItem('currentUser'));
const cabangLogin = localStorage.getItem('cabangHoki');
if (!currentUser) window.location.href = 'index.html';

let selectedCabang = 'Semua';

/* ── CUSTOM DROPDOWN CABANG ── */
function toggleDropdownCabang() {
    document.getElementById('selectCabangWrap').classList.toggle('open');
}

function pilihCabang(nama, label) {
    selectedCabang = nama;
    document.getElementById('selectedCabangLabel').innerText = label;
    document.querySelectorAll('#dropdownCabang .dropdown-item').forEach(el => el.classList.remove('active'));
    event.currentTarget.classList.add('active');
    document.getElementById('selectCabangWrap').classList.remove('open');
}

document.addEventListener('click', function(e) {
    const wrap = document.getElementById('selectCabangWrap');
    if (wrap && !wrap.contains(e.target)) wrap.classList.remove('open');
});

/* ── SIDEBAR ── */
function toggleSidebar() {
    const sb = document.getElementById('sidebar');
    const mc = document.getElementById('mainContent');
    sb.classList.toggle('collapsed');
    mc.classList.toggle('expanded');
    localStorage.setItem('sidebarState', sb.classList.contains('collapsed') ? 'small' : 'large');
}

function buildSidebar() {
    if (localStorage.getItem('sidebarState') === 'small') {
        document.getElementById('sidebar').classList.add('collapsed');
        document.getElementById('mainContent').classList.add('expanded');
    }
    const role = currentUser.role;
    const cur  = window.location.pathname.split('/').pop() || 'dashboard.html';
    const navItem = (icon, label, link) => {
        const active = cur === link ? 'active' : '';
        return `<button class="nav-item ${active}" onclick="location.href='${link}'">
            <span class="nav-icon">${icon}</span>
            <span class="nav-label">${label}</span>
        </button>`;
    };
    const PAGES_FRONTLINE = ['dashboard.html','history.html','stok.html','restock.html','laporan_staff.html','edukasi.html'];
    const PAGES_MGMT      = ['rekap.html','produk.html'];
    const PAGES_EXEC      = ['laporan.html','statistik.html','bahan_baku.html','hpp_produk.html','belanja.html','warehouse.html','salary_staff.html','customer_hoki.html'];
    const PAGES_VIP       = ['user.html','login_history.html'];
    const PAGES_INVESTOR  = ['investor_omset.html','investor_profit.html'];
    const inGroup = pages => pages.includes(cur);
    const getOpen = (id, pages) => {
        const s = localStorage.getItem('navGroup_' + id);
        return s !== null ? s === '1' : true;
    };
    const GROUP_ICONS = { frontline:'🛒', management:'📊', executive:'📋', vip:'👑', investor:'🤝' };
    const navGroup = (id, label, items, pages) => {
        const open      = getOpen(id, pages);
        const hasActive = inGroup(pages);
        const icon      = GROUP_ICONS[id] || '📁';
        return `<div class="nav-group-wrap">
            <button class="nav-group-label${hasActive ? ' has-active' : ''}" onclick="toggleNavGroup('${id}')">
                <span class="nav-group-icon">${icon}</span>
                <span class="nav-group-text">${label}</span>
                <span class="nav-group-ti">${open ? '−' : '+'}</span>
            </button>
            <div class="nav-group-items" id="navg-${id}"${open ? '' : ' style="display:none"'}>
                ${items}
            </div>
        </div>`;
    };

    let frontline = navItem('🛒','Kasir','dashboard.html')
        + navItem('📄','History Transaksi','history.html')
        + navItem('📦','Stok Harian','stok.html')
        + navItem('🚚','Restock Barang','restock.html')
        + navItem('🚀','Laporan Penjualan','laporan_staff.html');
    let edukasiItem = navItem('📚','Edukasi & SOP','edukasi.html');
    frontline += edukasiItem;
    let h = '';
    if (role !== 'Investor') {
        h += navGroup('frontline', 'Frontline', frontline, PAGES_FRONTLINE);
    }

    if (['Senior Staff','SPV','Owner','VIP'].includes(role)) {
        let mgmt = navItem('🗓️','Rekapan Penjualan','rekap.html')
            + navItem('🍱','Master Produk','produk.html');
        h += navGroup('management', 'Management', mgmt, PAGES_MGMT);
    }
    if (['Owner','VIP'].includes(role)) {
        let exec = navItem('📊','Keuangan Global','laporan.html')
            + navItem('📈','Statistik','statistik.html')
            + navItem('🧂','Bahan Baku','bahan_baku.html')
            + navItem('🗃️','HPP Produk','hpp_produk.html')
            + navItem('🏭','Warehouse','warehouse.html')
            + navItem('📝','Belanja','belanja.html')
            + navItem('💵','Salary Staff','salary_staff.html')
            + navItem('👨‍👩‍👦','Customer Hoki','customer_hoki.html');
        h += navGroup('executive', 'Executive', exec, PAGES_EXEC);
    }
    if (['Owner','VIP','Investor'].includes(role)) {
        let inv = navItem('💹','Omset Cabang','investor_omset.html')
            + navItem('💰','Profit Sharing','investor_profit.html');
        h += navGroup('investor', 'Area Investor', inv, PAGES_INVESTOR);
    }
    if (role === 'VIP') {
        let vip = navItem('⚙️','manajemen User','user.html')
            + navItem('🔑','History Login','login_history.html');
        h += navGroup('vip', 'VIP Access', vip, PAGES_VIP);
    }
    document.getElementById('sidebarNav').innerHTML = h;
    const name = currentUser.user || '?';
    document.getElementById('userAvatarInitial').innerText = name.charAt(0).toUpperCase();
    document.getElementById('sidebarUserName').innerText   = name;
    document.getElementById('sidebarUserRole').innerText   = role;
}

function toggleNavGroup(id) {
    const items = document.getElementById('navg-' + id);
    const btn   = items.previousElementSibling;
    const ti    = btn.querySelector('.nav-group-ti');
    const open  = items.style.display !== 'none';
    items.style.display = open ? 'none' : '';
    if (ti) ti.textContent = open ? '+' : '−';
    localStorage.setItem('navGroup_' + id, open ? '0' : '1');
}

/* ── CLOCK ── */
function updateClock() {
    const now = new Date();
    document.getElementById('realtimeClock').innerText = now.toLocaleTimeString('id-ID');
    document.getElementById('realtimeDate').innerText  = now.toLocaleDateString('id-ID',{weekday:'short',year:'numeric',month:'short',day:'numeric'});
}
setInterval(updateClock, 1000);

/* ── MORE MENU ── */
function buildMoreMenu() {
    const role = currentUser.role;
    const items = [{icon:'🚚',label:'Restock',link:'restock.html'}];
    items.push({icon:'📚',label:'Edukasi & SOP',link:'edukasi.html'});
    if (['Senior Staff','SPV','Owner','VIP'].includes(role)) {
        items.push({icon:'🍱',label:'Produk',link:'produk.html'});
        items.push({icon:'📈',label:'Rekapan',link:'rekap.html'});
    }
    if (['Owner','VIP'].includes(role)) {
        items.push({icon:'🧂',label:'Bahan Baku',link:'bahan_baku.html'});
        items.push({icon:'🗃️',label:'HPP Produk',link:'hpp_produk.html'});
        items.push({icon:'🏭',label:'Warehouse',link:'warehouse.html'});
        items.push({icon:'📝',label:'Belanja',link:'belanja.html'});
        items.push({icon:'💵',label:'Salary Staff',link:'salary_staff.html'});
        items.push({icon:'📊',label:'Keuangan',link:'laporan.html'});
        items.push({icon:'📈',label:'Statistik',link:'statistik.html'});
        items.push({icon:'👨‍👩‍👦',label:'Customer Hoki',link:'customer_hoki.html'});
    }
    if (['Owner','VIP','Investor'].includes(role)) {
        items.push({icon:'💹',label:'Omset Cabang',link:'investor_omset.html'});
        items.push({icon:'💰',label:'Profit Sharing',link:'investor_profit.html'});
    }
    if (role === 'VIP') {
        items.push({icon:'⚙️',label:'Users',link:'user.html'});
        items.push({icon:'🔑',label:'Login Log',link:'login_history.html'});
    }
    items.push({icon:'🚪',label:'Logout',link:'#',action:'logout()'});
    document.getElementById('moreGrid').innerHTML = items.map(i =>
        `<button class="more-btn" onclick="${i.action||`location.href='${i.link}'`}">
            <span class="more-btn-icon">${i.icon}</span>
            <span class="more-btn-label">${i.label}</span>
        </button>`).join('');
}

function openSheet(id) { if(id==='moreSheet') buildMoreMenu(); document.getElementById(id).classList.add('open'); }
function closeSheetOutside(e,id) { if(e.target===document.getElementById(id)) document.getElementById(id).classList.remove('open'); }

/* ── LOGIKA (TIDAK BERUBAH) ── */
async function loadCabang() {
    try {
        const res      = await fetch(`${API_BASE}?action=get_branches`);
        const cabangDB = await res.json();
        const dropdown = document.getElementById('dropdownCabang');
        const role     = currentUser.role;

        let html = `<div class="dropdown-item active" onclick="pilihCabang('Semua','Semua Cabang')">🏪 Semua Cabang</div>`;
        cabangDB.forEach(c => {
            html += `<div class="dropdown-item" onclick="pilihCabang('${c.nama_cabang}','${c.nama_cabang}')">📍 ${c.nama_cabang}</div>`;
        });
        dropdown.innerHTML = html;

        if (['Staff','Senior Staff','SPV'].includes(role)) {
            selectedCabang = cabangLogin;
            document.getElementById('selectedCabangLabel').innerText          = cabangLogin;
            document.getElementById('selectCabangWrap').style.pointerEvents   = 'none';
            document.getElementById('selectCabangWrap').style.opacity         = '0.6';
            document.getElementById('btnKosongkan').style.display             = 'none';
        }
    } catch(e) { console.error('Gagal load cabang'); }
}

async function renderHistory() {
    const tbody = document.getElementById('tabelHistory');
    tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state"><span class="icon">⏳</span><p>Memuat data...</p></div></td></tr>`;
    try {
        const tglMulai      = document.getElementById('tglMulai').value;
        const tglSelesai    = document.getElementById('tglSelesai').value;
        const role          = currentUser.role;
        const cabangLoginRaw = (cabangLogin || '').trim().toLowerCase();

        let queryParams = new URLSearchParams();
        if (tglMulai) queryParams.append('tgl_mulai', tglMulai);
        if (tglSelesai) queryParams.append('tgl_selesai', tglSelesai);
        
        if (['VIP', 'Owner'].includes(role)) {
            if (selectedCabang !== 'Semua') queryParams.append('cabang', selectedCabang);
        } else {
            queryParams.append('cabang', cabangLogin);
        }

        const res = await fetch(`${API_BASE}?action=get_history&${queryParams.toString()}`);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const transaksiList = await res.json();

        const fragment = document.createDocumentFragment();
        let count = 0;
        
        // Cek apakah user yang login punya hak akses menghapus (Hanya Owner & VIP)
        const canDelete = ['VIP', 'Owner'].includes(role);

        transaksiList.forEach(t => {
            const cabangTrx = (t.cabang || '').trim().toLowerCase();

            // Proteksi hak akses cabang untuk Staff
            if (!['VIP', 'Owner'].includes(role)) {
                if (cabangTrx !== cabangLoginRaw) return;
            }

            let items = [];
            try { items = JSON.parse(t.items_json || '[]'); } catch(_) { items = []; }
            const namaItems = items.map(it => it?.nama || it?.name || '').filter(Boolean).join(', ') || '—';

            let waktuDisplay = '—';
            if (t.waktu) {
                const parts = t.waktu.replace('T', ' ').split(' ');
                const tgl   = parts[0] || '—';
                const jam   = parts[1] ? parts[1].slice(0, 5) : '';
                waktuDisplay = `<span>${tgl}</span><span style="color:var(--text-light);font-size:10px;">${jam}</span>`;
            }

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><span class="waktu-text">${waktuDisplay}</span></td>
                <td>${t.petugas || '—'}</td>
                <td><span class="${(t.pelanggan_nama && t.pelanggan_nama !== 'No Cust') ? 'pelanggan-member' : 'pelanggan-nonmember'}">${t.pelanggan_nama || 'No Cust'}</span></td>
                <td><span class="cabang-text">${t.cabang || '—'}</span></td>
                <td><span class="item-text">${namaItems}</span></td>
                <td><span class="total-text">Rp ${parseInt(t.total || 0).toLocaleString('id-ID')}</span></td>
                <td><span class="tag-metode">${t.metode || '—'}</span></td>
                <td><button class="btn-hapus-icon" onclick="hapusTransaksi(${t.id})" title="Hapus Data">🗑️</button></td>
            `;
            fragment.appendChild(tr);
            count++;
        });

        tbody.innerHTML = '';
        if (count === 0) {
            tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state"><span class="icon">📄</span><p>Tidak ada data transaksi</p></div></td></tr>`;
        } else {
            tbody.appendChild(fragment);
        }
    } catch(e) {
        console.error('renderHistory:', e);
        tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state"><span class="icon">⚠️</span><p>Gagal memuat data. Coba refresh.</p></div></td></tr>`;
    }
}

async function hapusTransaksi(id) {
    const userNow = JSON.parse(localStorage.getItem('currentUser') || '{}');
    
    // Kembali menggunakan showConfirm kustom kamu yang rapi
    const ok = await showConfirm('Hapus transaksi ini secara permanen?', 'Ya, Hapus', 'Batal', '🗑️');
    if (!ok) return;
    
    try {
        const token = localStorage.getItem('sessionToken') || userNow.token || '';
        const user  = userNow.user || '';
        
        const url = `${API_BASE}?action=del_transaksi&id=${id}&token=${encodeURIComponent(token)}&user=${encodeURIComponent(user)}`;
        const res = await fetch(url);
        
        if (res.status === 403) {
            toast.error('Akses ditolak oleh server!');
            return;
        }
        
        const hasil = await res.json();
        if (hasil.status === 'success') {
            toast.success('Transaksi berhasil dihapus!');
            renderHistory(); // Refresh data tabel otomatis
        } else {
            toast.error(hasil.message || 'Gagal menghapus transaksi!');
        }
    } catch(e) {
        console.error('Gagal hapus transaksi:', e);
        toast.error('Gagal menghapus transaksi! Periksa koneksi internet.');
    }
}

function filterHariIni() {
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('tglMulai').value   = today;
    document.getElementById('tglSelesai').value = today;
    renderHistory();
}

function kosongkanFilter() {
    document.getElementById('tglMulai').value   = '';
    document.getElementById('tglSelesai').value = '';
    selectedCabang = 'Semua';
    document.getElementById('selectedCabangLabel').innerText = 'Semua Cabang';
    document.querySelectorAll('#dropdownCabang .dropdown-item').forEach((el, i) => {
        el.classList.toggle('active', i === 0);
    });
    renderHistory();
}

async function logout() {
    const ok = await showConfirm('Logout dari sistem?', 'Ya, Logout', 'Batal', '🚪');
    if (ok) {
        localStorage.removeItem('currentUser');
        localStorage.removeItem('cabangHoki');
        window.location.href = 'index.html';
    }
}

window.onload = async function() {
    buildSidebar();
    updateClock();
    document.getElementById('infoPetugas').innerText = currentUser.fullName || currentUser.user || '—';
    document.getElementById('infoCabang').innerText  = cabangLogin || '—';
    await loadCabang();
    renderHistory();
};
</script>
