<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hoki POS - HPP Produk</title>
        <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥟</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&family=DM+Mono:wght@400;500&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=20260501">
    <style>
    .grid-hpp {
        display: flex;
        flex-direction: column;
        gap: 16px;
    }

    .grid-hpp > div { min-width: 0; }

    .card-hpp {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--r-lg);
        padding: 20px;
        box-shadow: var(--sh-sm);
    }

    .card-hpp h3 {
        margin: 0 0 16px;
        font-size: 14px;
        font-weight: 700;
        color: var(--text);
        border-bottom: 1px solid var(--border);
        padding-bottom: 10px;
    }

    .input-group {
        display: flex;
        flex-direction: column;
        gap: 4px;
        margin-bottom: 12px;
    }

    .input-group label {
        font-size: 10px;
        font-weight: 700;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.8px;
    }

    .input-group input {
        margin: 0;
        padding: 9px 12px;
        border: 1.5px solid var(--border);
        border-radius: var(--r-md);
        font-size: 13px;
        font-family: 'DM Sans', sans-serif;
        background: var(--surface);
        color: var(--text);
        outline: none;
        transition: border-color 0.2s;
        width: 100%;
        box-sizing: border-box;
    }

    .input-group input:focus { border-color: var(--red); }
    .input-group input[readonly] {
        background: var(--surface-2);
        color: var(--red);
        font-family: 'DM Mono', monospace;
        font-weight: 700;
    }

    /* Bahan picker */
    .bahan-row {
        display: flex;
        gap: 8px;
        align-items: center;
        margin-bottom: 8px;
        width: 100%;
    }

    /* Custom select inside bahan-row */
    .bahan-wrap {
        flex: 1;
        min-width: 0;
        margin-bottom: 0;
    }

    .bahan-wrap .custom-select-btn {
        height: 38px;
        padding: 0 10px;
        border: 1.5px solid var(--border);
        border-radius: var(--r-md);
        border-width: 1.5px;
        font-size: 13px;
        font-weight: 500;
    }

    .bahan-row .bahan-qty-input {
        width: 80px;
        flex-shrink: 0;
        margin: 0;
        padding: 8px 10px;
        border: 1.5px solid var(--border);
        border-radius: var(--r-md);
        font-size: 13px;
        font-family: 'DM Sans', sans-serif;
        background: var(--surface);
        color: var(--text);
        outline: none;
        height: 38px;
        box-sizing: border-box;
    }

    .bahan-row .bahan-qty-input:focus { border-color: var(--red); }
    .bahan-row button { flex-shrink: 0; }

    .hpp-total {
        font-family: 'DM Mono', monospace;
        font-size: 18px;
        font-weight: 700;
        color: var(--red);
        text-align: right;
        padding: 12px 0;
        border-top: 2px dashed var(--border);
        margin-top: 8px;
    }

    /* Tabel list */
    .table-wrap {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--r-lg);
        overflow-x: auto;
        overflow-y: hidden;
        box-shadow: var(--sh-sm);
        -webkit-overflow-scrolling: touch;
    }

    .table-wrap table { width: 100%; border-collapse: collapse; table-layout: fixed; }
    .table-wrap thead th {
        background: var(--red);
        color: white;
        padding: 10px 14px;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        border: none;
        text-align: left;
    }
    /* column widths — persentase agar proporsional di semua lebar layar */
    .table-wrap thead th:nth-child(1) { width: 16%; }
    .table-wrap thead th:nth-child(2) { width: 8%; }
    .table-wrap thead th:nth-child(3) { width: 46%; }
    .table-wrap thead th:nth-child(4) { width: 14%; }
    .table-wrap thead th:nth-child(5) { width: 16%; text-align: center; }
    .table-wrap tbody td:nth-child(5) { text-align: center; }

    /* tombol aksi sejajar */
    .aksi-group { display: flex; gap: 6px; align-items: center; justify-content: center; }
    .table-wrap tbody td {
        padding: 10px 14px;
        border-bottom: 1px solid var(--border);
        font-size: 13px;
        color: var(--text);
        border-top: none; border-left: none; border-right: none;
        word-break: break-word;
    }
    .table-wrap tbody tr:last-child td { border-bottom: none; }
    .table-wrap tbody tr:hover td { background: var(--red-soft); }

    .mono { font-family: 'DM Mono', monospace; font-weight: 700; }
    .red  { color: var(--red); }

    .detail-chip {
        display: inline-block;
        background: var(--surface-2);
        border: 1px solid var(--border);
        border-radius: 99px;
        padding: 2px 8px;
        font-size: 11px;
        color: var(--text-muted);
        margin: 2px;
        white-space: nowrap;
    }

    /* Custom select for produk picker (input-group context) */
    .input-group .custom-select-wrap { margin-bottom: 0; }
    .input-group .custom-select-btn {
        padding: 9px 12px;
        border: 1.5px solid var(--border);
        border-radius: var(--r-md);
        border-width: 1.5px;
        font-size: 13px;
        font-weight: 500;
    }

    @media (max-width: 844px) {
        .grid-hpp { grid-template-columns: 1fr; gap: 12px; }
        .card-hpp { padding: 14px; }
        .btn-add-bahan, .btn-simpan-hpp { display: flex !important; width: 100%; justify-content: center; }
        .bahan-row .bahan-qty-input { width: 70px; }
        .table-wrap table { min-width: 560px; }
        .hpp-total { font-size: 15px; }
    }
    </style>
  <script src="config.js"></script>
</head>
<body>

<aside class="sidebar" id="sidebar">
    <div class="sidebar-brand" onclick="toggleSidebar()">
        <div class="sidebar-logo"><img src="Assets/logobrand.png" alt="Hoki"></div>
        <div class="sidebar-brand-text">
            <div class="sidebar-brand-name">Hoki Dimsum</div>
            <div class="sidebar-brand-sub">POS System v2.0</div>
        </div>
    </div>
    <button class="sidebar-toggle" onclick="toggleSidebar()">‹</button>
    <nav class="sidebar-nav" id="sidebarNav"></nav>
    <div class="sidebar-user">
        <div class="user-card">
            <div class="user-avatar" id="userAvatarInitial">?</div>
            <div class="user-info">
                <div class="user-name" id="sidebarUserName">Loading...</div>
                <div class="user-role" id="sidebarUserRole">—</div>
            </div>
            <button class="btn-logout-icon" onclick="logout()" title="Logout">🚪</button>
        </div>
    </div>
</aside>

<div class="main-content" id="mainContent">
    <header class="top-header">
        <div class="header-left">
            <div class="header-page-title">💰 HPP Produk</div>
        </div>
        <div class="header-right">
            <div class="clock-pill">
                <div id="realtimeClock">00:00:00</div>
                <div id="realtimeDate">...</div>
            </div>
        </div>
    </header>

    <div class="page-body">
        <div class="grid-hpp">

            <!-- FORM -->
            <div class="card-hpp">
                <h3>➕ Setting HPP Produk</h3>
            
                <div class="input-group">
                    <label>Nama Produk</label>
                    <input type="text" id="hNama" placeholder="Input nama produk...">
                </div>
            
                <div class="input-group">
                    <label>SKU (Kode Produk)</label>
                    <input type="text" id="hSKU" placeholder="Input SKU (Cth: DMS-01)..." style="text-transform: uppercase;">
                </div>
                
                <input type="hidden" id="hProdukId">
            
                <p style="font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.8px;margin:16px 0 8px;">Komposisi Bahan</p>
                <div id="listBahanPicker"></div>
                <button class="btn-add-bahan" onclick="tambahBahanRow()">+ Tambah Bahan</button>
            
                <div class="hpp-total" id="hppTotal">HPP: Rp 0</div>
            
                <button class="btn-simpan-hpp" onclick="simpanHPP()">💾 Simpan HPP</button>
            </div>

            <!-- LIST -->
            <div>
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>Nama Produk</th>
                                <th>SKU</th>
                                <th>Komposisi</th>
                                <th>HPP</th>
                                <th>Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="tabelHPP">
                            <tr><td colspan="5" style="text-align:center;padding:32px;color:var(--text-light);">Memuat...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>
</div>

<nav class="bottom-nav">
    <button class="bn-item" onclick="location.href='dashboard.html'"><span class="bn-icon">🛒</span><span class="bn-label">Kasir</span></button>
    <button class="bn-item" onclick="location.href='history.html'"><span class="bn-icon">📄</span><span class="bn-label">History</span></button>
    <button class="bn-item" onclick="location.href='stok.html'"><span class="bn-icon">📦</span><span class="bn-label">Stok</span></button>
    <button class="bn-item" onclick="location.href='laporan_staff.html'"><span class="bn-icon">📊</span><span class="bn-label">Laporan</span></button>
    <button class="bn-item active" onclick="openSheet('moreSheet')"><span class="bn-icon">☰</span><span class="bn-label">Lainnya</span></button>
</nav>

<div class="sheet-overlay" id="moreSheet" onclick="closeSheetOutside(event,'moreSheet')">
    <div class="bottom-sheet" onclick="event.stopPropagation()">
        <div class="sheet-handle"></div>
        <p style="font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:14px;">Menu Lainnya</p>
        <div class="more-grid" id="moreGrid"></div>
    </div>
</div>

<script>
const currentUser = JSON.parse(localStorage.getItem('currentUser')) || {user:'Guest', role:'Staff'};
if (!currentUser.user) window.location.href = 'index.html';
if (!['Owner','VIP'].includes(currentUser.role)) window.location.href = 'dashboard.html';

let allBahan = [];
let allHPP   = [];
let editHPPId = null;

function toggleSidebar() {
    const sb = document.getElementById('sidebar');
    const mc = document.getElementById('mainContent');
    sb.classList.toggle('collapsed');
    mc.classList.toggle('expanded');
    localStorage.setItem('sidebarState', sb.classList.contains('collapsed') ? 'small' : 'large');
}

function buildSidebar() {
    if (localStorage.getItem('sidebarState') === 'small') {
        document.getElementById('sidebar').classList.add('collapsed');
        document.getElementById('mainContent').classList.add('expanded');
    }
    const role = currentUser.role;
    const cur  = window.location.pathname.split('/').pop() || 'dashboard.html';
    const navItem = (icon, label, link) => {
        const active = cur === link ? 'active' : '';
        return `<button class="nav-item ${active}" onclick="location.href='${link}'">
            <span class="nav-icon">${icon}</span>
            <span class="nav-label">${label}</span>
        </button>`;
    };
    const PAGES_FRONTLINE = ['dashboard.html','history.html','stok.html','restock.html','laporan_staff.html'];
    const PAGES_MGMT      = ['rekap.html','produk.html'];
    const PAGES_EXEC      = ['laporan.html','statistik.html','bahan_baku.html','hpp_produk.html','belanja.html','warehouse.html'];
    const PAGES_VIP       = ['user.html','login_history.html'];
    const inGroup = pages => pages.includes(cur);
    const getOpen = (id) => {
        const s = localStorage.getItem('navGroup_' + id);
        return s !== null ? s === '1' : true;
    };
    const GROUP_ICONS = { frontline:'🛒', management:'📊', executive:'📋', vip:'👑' };
    const navGroup = (id, label, items, pages) => {
        const open      = getOpen(id);
        const hasActive = inGroup(pages);
        const icon      = GROUP_ICONS[id] || '📁';
        return `<div class="nav-group-wrap">
            <button class="nav-group-label${hasActive ? ' has-active' : ''}" onclick="toggleNavGroup('${id}')">
                <span class="nav-group-icon">${icon}</span>
                <span class="nav-group-text">${label}</span>
                <span class="nav-group-ti">${open ? '−' : '+'}</span>
            </button>
            <div class="nav-group-items" id="navg-${id}"${open ? '' : ' style="display:none"'}>
                ${items}
            </div>
        </div>`;
    };

    let frontline = navItem('🛒','Kasir','dashboard.html')
        + navItem('📄','History Transaksi','history.html')
        + navItem('📦','Stok Harian','stok.html')
        + navItem('🚚','Restock Barang','restock.html')
        + navItem('📊','Laporan Penjualan','laporan_staff.html');
    let h = navGroup('frontline', 'Frontline', frontline, PAGES_FRONTLINE);

    if (['Senior Staff','SPV','Owner','VIP'].includes(role)) {
        let mgmt = navItem('📈','Rekapan Penjualan','rekap.html')
            + navItem('🍱','Master Produk','produk.html');
        h += navGroup('management', 'Management', mgmt, PAGES_MGMT);
    }
    if (['Owner','VIP'].includes(role)) {
        let exec = navItem('📊','Keuangan Global','laporan.html')
            + navItem('📈','Statistik','statistik.html')
            + navItem('🧂','Bahan Baku','bahan_baku.html')
            + navItem('💰','HPP Produk','hpp_produk.html')
            + navItem('🏭','Warehouse','warehouse.html')
            + navItem('💸','Belanja','belanja.html');
        h += navGroup('executive', 'Executive', exec, PAGES_EXEC);
    }
    if (role === 'VIP') {
        let vip = navItem('👥','Manajemen User','user.html')
            + navItem('🔑','History Login','login_history.html');
        h += navGroup('vip', 'VIP Access', vip, PAGES_VIP);
    }
    document.getElementById('sidebarNav').innerHTML = h;
    const name = currentUser.user || '?';
    document.getElementById('userAvatarInitial').innerText = name.charAt(0).toUpperCase();
    document.getElementById('sidebarUserName').innerText   = name;
    document.getElementById('sidebarUserRole').innerText   = role;
}

function toggleNavGroup(id) {
    const items = document.getElementById('navg-' + id);
    const btn   = items.previousElementSibling;
    const ti    = btn.querySelector('.nav-group-ti');
    const open  = items.style.display !== 'none';
    items.style.display = open ? 'none' : '';
    if (ti) ti.textContent = open ? '+' : '−';
    localStorage.setItem('navGroup_' + id, open ? '0' : '1');
}

function updateClock() {
    const now = new Date();
    document.getElementById('realtimeClock').innerText = now.toLocaleTimeString('id-ID');
    document.getElementById('realtimeDate').innerText  = now.toLocaleDateString('id-ID',{weekday:'short',year:'numeric',month:'short',day:'numeric'});
}
setInterval(updateClock, 1000);

function buildMoreMenu() {
    const role = currentUser.role;
    const items = [{icon:'🚚',label:'Restock',link:'restock.html'}];
    if (['Senior Staff','SPV','Owner','VIP'].includes(role)) {
        items.push({icon:'🍱',label:'Produk',link:'produk.html'});
        items.push({icon:'📈',label:'Rekapan',link:'rekap.html'});
    }
    if (['Owner','VIP'].includes(role)) {
        items.push({icon:'🧂',label:'Bahan Baku',link:'bahan_baku.html'});
        items.push({icon:'💰',label:'HPP Produk',link:'hpp_produk.html'});
        items.push({icon:'🏭',label:'Warehouse',link:'warehouse.html'});
        items.push({icon:'💸',label:'Belanja',link:'belanja.html'});
        items.push({icon:'📊',label:'Keuangan',link:'laporan.html'});
        items.push({icon:'📈',label:'Statistik',link:'statistik.html'});
    }
    if (role === 'VIP') {
        items.push({icon:'👥',label:'Users',link:'user.html'});
        items.push({icon:'🔑',label:'Login Log',link:'login_history.html'});
    }
    items.push({icon:'🚪',label:'Logout',link:'#',action:'logout()'});
    document.getElementById('moreGrid').innerHTML = items.map(i =>
        `<button class="more-btn" onclick="${i.action||`location.href='${i.link}'`}">
            <span class="more-btn-icon">${i.icon}</span>
            <span class="more-btn-label">${i.label}</span>
        </button>`).join('');
}

function openSheet(id) { if(id==='moreSheet') buildMoreMenu(); document.getElementById(id).classList.add('open'); }
function closeSheetOutside(e,id) { if(e.target===document.getElementById(id)) document.getElementById(id).classList.remove('open'); }

/* ── CUSTOM DROPDOWN HELPERS ── */
function toggleDropdown(wrapId) {
    const wrap = document.getElementById(wrapId);
    document.querySelectorAll('.custom-select-wrap.open').forEach(w => {
        if (w.id !== wrapId) w.classList.remove('open');
    });
    wrap.classList.toggle('open');
}

document.addEventListener('click', function(e) {
    document.querySelectorAll('.custom-select-wrap').forEach(wrap => {
        if (!wrap.contains(e.target)) wrap.classList.remove('open');
    });
});

/* ── PILIH PRODUK (custom dropdown) ── */
function pilihProdukHPP(el) {
    document.getElementById('labelProdukHPP').innerText = el.textContent.trim();
    document.querySelectorAll('#dropdownProdukHPP .dropdown-item').forEach(i => i.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('wrapProdukHPP').classList.remove('open');
    document.getElementById('hProdukId').value = el.dataset.id  || '';
    document.getElementById('hNama').value     = el.dataset.nama || '';
    document.getElementById('hSKU').value      = el.dataset.sku  || '';
    document.getElementById('hSKUDisplay').innerText = el.dataset.sku ? `SKU: ${el.dataset.sku}` : '';
}

/* ── PILIH BAHAN dalam row ── */
function pilihBahanRow(wrapId, dropId, lblId, el) {
    document.getElementById(lblId).innerText = el.textContent.trim();
    document.querySelectorAll('#' + dropId + ' .dropdown-item').forEach(i => i.classList.remove('active'));
    el.classList.add('active');
    document.getElementById(wrapId).classList.remove('open');
    hitungTotal();
}

/* ── BAHAN PICKER ROWS ── */
function tambahBahanRow(bahanId='', qty='') {
    const container = document.getElementById('listBahanPicker');
    const uid    = Date.now() + '_' + Math.random().toString(36).slice(2,5);
    const rowId  = 'br_' + uid;
    const wrapId = 'bw_' + uid;
    const dropId = 'bd_' + uid;
    const lblId  = 'bl_' + uid;

    const selectedBahan = bahanId ? allBahan.find(b => b.id == bahanId) : null;
    const selectedLabel = selectedBahan ? selectedBahan.nama : 'Pilih Bahan...';

    const optionsHTML = allBahan.map(b => {
        const label = `${b.nama} (Rp${parseFloat(b.harga_satuan).toLocaleString('id-ID',{maximumFractionDigits:2})}/${b.satuan})`;
        return `<div class="dropdown-item${b.id == bahanId ? ' active' : ''}"
            data-id="${b.id}" data-hs="${b.harga_satuan}" data-satuan="${b.satuan}"
            onclick="pilihBahanRow('${wrapId}','${dropId}','${lblId}',this)">${label}</div>`;
    }).join('');

    const row = document.createElement('div');
    row.className = 'bahan-row';
    row.id = rowId;
    row.innerHTML = `
        <div class="custom-select-wrap bahan-wrap" id="${wrapId}">
            <button class="custom-select-btn" onclick="toggleDropdown('${wrapId}')">
                <span id="${lblId}">${selectedLabel}</span>
                <svg width="12" height="8" viewBox="0 0 12 8" fill="none"><path d="M1 1l5 5 5-5" stroke="#d32f2f" stroke-width="1.5" stroke-linecap="round"/></svg>
            </button>
            <div class="custom-dropdown" id="${dropId}">${optionsHTML}</div>
        </div>
        <input type="number" class="bahan-qty-input" placeholder="Qty" value="${qty}" oninput="hitungTotal()" min="0" step="0.01">
        <button class="btn-del-bahan" onclick="document.getElementById('${rowId}').remove();hitungTotal()">×</button>`;
    container.appendChild(row);
    hitungTotal();
}

function hitungTotal() {
    let total = 0;
    document.querySelectorAll('.bahan-row').forEach(row => {
        const active = row.querySelector('.custom-dropdown .dropdown-item.active');
        const qty    = parseFloat(row.querySelector('.bahan-qty-input')?.value) || 0;
        if (active && active.dataset.id) {
            total += (parseFloat(active.dataset.hs) || 0) * qty;
        }
    });
    document.getElementById('hppTotal').innerText = `HPP: Rp ${total.toLocaleString('id-ID', {minimumFractionDigits:0, maximumFractionDigits:0})}`;
    return total;
}

function getBahanList() {
    const list = [];
    document.querySelectorAll('.bahan-row').forEach(row => {
        const active = row.querySelector('.custom-dropdown .dropdown-item.active');
        const qty    = parseFloat(row.querySelector('.bahan-qty-input')?.value) || 0;
        if (active && active.dataset.id && qty > 0) {
            const hs    = parseFloat(active.dataset.hs) || 0;
            const bahan = allBahan.find(b => b.id == active.dataset.id);
            list.push({
                bahan_id:     parseInt(active.dataset.id),
                nama:         bahan ? bahan.nama : active.textContent.trim().split(' (')[0],
                qty,
                harga_satuan: hs,
                subtotal:     hs * qty
            });
        }
    });
    return list;
}

async function simpanHPP() {
    const nama  = document.getElementById('hNama').value.trim();
    const sku   = document.getElementById('hSKU').value.trim().toUpperCase();
    const bahan = getBahanList();
    const hpp   = hitungTotal();

    if (!nama || !sku) return toast.warning('Pilih produk terlebih dahulu!');
    if (bahan.length === 0) return toast.warning('Tambah minimal 1 bahan!');

    const payload = { id: editHPPId, nama_produk: nama, sku, bahan, harga_pokok: hpp };

    try {
        const res   = await fetch(`${API_BASE}?action=save_hpp_produk`, {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify(payload)
        });
        const hasil = await res.json();
        if (hasil.status === 'success') {
            toast.success(editHPPId ? 'HPP diupdate!' : 'HPP berhasil disimpan!');
            resetForm();
            muatHPP();
        } else {
            toast.error('Gagal menyimpan!');
        }
    } catch(e) { toast.error('Gagal koneksi!'); }
}

function resetForm() {
    editHPPId = null;
    document.getElementById('hNama').value = '';
    document.getElementById('hSKU').value = '';
    document.getElementById('hProdukId').value = '';
    document.getElementById('listBahanPicker').innerHTML = '';
    document.getElementById('hppTotal').innerText = 'HPP: Rp 0';
    document.querySelector('.btn-simpan-hpp').innerText = '💾 Simpan HPP';
}

function siapkanEditHPP(id) {
    const h = allHPP.find(x => x.id == id);
    if (!h) return;
    editHPPId = id;

    // Langsung isi ke field input manual
    document.getElementById('hNama').value = h.nama_produk;
    document.getElementById('hSKU').value = h.sku;

    document.getElementById('listBahanPicker').innerHTML = '';
    const detail = JSON.parse(h.detail_json || '[]');
    detail.forEach(d => tambahBahanRow(d.bahan_id, d.qty));
    hitungTotal();
    document.querySelector('.btn-simpan-hpp').innerText = '💾 Update HPP';
    window.scrollTo({top:0, behavior:'smooth'});
}

async function hapusHPP(id) {
    const ok = await showConfirm('Hapus HPP produk ini?', 'Ya, Hapus', 'Batal', '🗑️');
    if (!ok) return;
    try {
        await fetch(`${API_BASE}?action=del_hpp_produk&id=${id}`);
        toast.success('HPP dihapus!');
        muatHPP();
    } catch(e) { toast.error('Gagal!'); }
}

async function muatHPP() {
    try {
        const res = await fetch(`${API_BASE}?action=get_hpp_produk`);
        allHPP    = await res.json();
        const tbody = document.getElementById('tabelHPP');
        if (!allHPP.length) {
            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:32px;color:var(--text-light);">Belum ada HPP Produk</td></tr>';
            return;
        }
        tbody.innerHTML = allHPP.map(h => {
            const detail  = JSON.parse(h.detail_json || '[]');
            const chips   = detail.map(d => `<span class="detail-chip">${d.nama || ''} ${d.qty}${d.satuan||''}</span>`).join('');
            return `<tr>
                <td><b>${h.nama_produk}</b></td>
                <td class="mono">${h.sku}</td>
                <td>${chips}</td>
                <td class="mono red">Rp ${parseFloat(h.harga_pokok).toLocaleString('id-ID')}</td>
                <td><div class="aksi-group">
                    <button class="btn-edit" onclick="siapkanEditHPP(${h.id})">✎ Edit</button>
                    <button class="btn-del" onclick="hapusHPP(${h.id})">✖</button>
                </div></td>
            </tr>`;
        }).join('');
    } catch(e) { console.error(e); }
}

async function init() {
    try {
        const resBahan = await fetch(`${API_BASE}?action=get_bahan_baku`);
        allBahan = await resBahan.json();
        // Dropdown produk dihapus dari sini
    } catch(e) { console.error(e); }
    await muatHPP();
    tambahBahanRow();
}

async function logout() {
    const ok = await showConfirm('Logout dari sistem?', 'Ya, Logout', 'Batal', '🚪');
    if (ok) {
        localStorage.removeItem('currentUser');
        localStorage.removeItem('cabangHoki');
        window.location.href = 'index.html';
    }
}

window.onload = () => { buildSidebar(); updateClock(); init(); };
</script>
