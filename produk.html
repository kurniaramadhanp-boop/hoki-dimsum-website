<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hoki POS - Master Produk</title>
        <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥟</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&family=DM+Mono:wght@400;500&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=20260501">
    <style>

    /* ── FORM PRODUK ── */
    .form-produk {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--r-lg);
        padding: 20px;
        margin-bottom: 12px;
        box-shadow: var(--sh-sm);
    }

    .grid-input {
        display: grid;
        grid-template-columns: 0.8fr 1.5fr 1fr 1fr auto;
        gap: 10px;
        align-items: center;
    }

    .grid-input input {
        margin: 0;
        padding: 9px 10px;
        border: 1px solid var(--border);
        border-radius: var(--r-sm);
        font-family: 'DM Sans', sans-serif;
        font-size: 13px;
        color: var(--text);
        background: var(--surface);
        outline: none;
        transition: border-color var(--ease);
        width: 100%;
    }

    .grid-input input:focus {
        border-color: var(--red);
    }

    /* ── TABLE ── */
    .table-wrap {
        overflow-x: auto;
        border-radius: var(--r-lg);
        border: 1px solid var(--border);
        box-shadow: var(--sh-sm);
        background: var(--surface);
    }

    .table-wrap table {
        width: 100%;
        border-collapse: collapse;
        background: var(--surface);
        border-radius: 0;
        box-shadow: none;
        border: none;
    }

    .table-wrap table thead th {
        background: var(--red);
        color: white;
        padding: 10px 12px;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        border: none;
    }

    .table-wrap table tbody td {
        padding: 9px 12px;
        border-bottom: 1px solid var(--border);
        font-size: 13px;
        color: var(--text);
        border-top: none;
        border-left: none;
        border-right: none;
    }

    .table-wrap table tbody tr:last-child td {
        border-bottom: none;
    }

    .table-wrap table tbody tr:hover td {
        background: var(--surface-2);
    }

    /* ── BADGES ── */
    .drag-handle {
        color: var(--text-light);
        cursor: grab;
        font-size: 14px;
        user-select: none;
    }

    .drag-handle:active {
        cursor: grabbing;
    }

    .sku-badge {
        font-family: 'DM Mono', monospace;
        font-weight: 700;
        font-size: 13px;
        color: var(--text);
    }

    .harga-text {
        font-family: 'DM Mono', monospace;
        font-weight: 700;
        color: var(--red);
    }

    .qty-badge {
        background: var(--surface-2);
        border: 1px solid var(--border);
        padding: 2px 8px;
        border-radius: 99px;
        font-size: 11px;
        font-weight: 700;
        color: var(--text-muted);
        font-family: 'DM Mono', monospace;
    }

    /* ── ACTION BUTTONS ── */
    tr[draggable="true"] {
        cursor: grab;
    }

    /* ── RESPONSIVE MOBILE ── */
    @media (max-width: 844px) {

        .grid-input {
            grid-template-columns: 1fr 1fr;
        }

        .grid-input button {
            grid-column: span 2;
        }

        table th:nth-child(1),
        table td:nth-child(1),
        table th:nth-child(5),
        table td:nth-child(5) {
            display: none;
        }

    }

    </style>
  <script src="config.js"></script>
</head>
<body>

<!-- ── SIDEBAR ── -->
<aside class="sidebar" id="sidebar">
    <div class="sidebar-brand" onclick="toggleSidebar()">
        <div class="sidebar-logo">
            <img src="Assets/3.png" alt="Hoki">
        </div>
        <div class="sidebar-brand-text">
            <div class="sidebar-brand-name">Hoki Dimsum</div>
            <div class="sidebar-brand-sub">POS System v3.0</div>
        </div>
    </div>
    <button class="sidebar-toggle" onclick="toggleSidebar()">‹</button>
    <nav class="sidebar-nav" id="sidebarNav"></nav>
    <div class="sidebar-user">
        <div class="user-card">
            <div class="user-avatar" id="userAvatarInitial">?</div>
            <div class="user-info">
                <div class="user-name" id="sidebarUserName">Loading...</div>
                <div class="user-role" id="sidebarUserRole">—</div>
            </div>
            <button class="btn-logout-icon" onclick="logout()" title="Logout">🚪</button>
        </div>
    </div>
</aside>

<!-- ── MAIN CONTENT ── -->
<div class="main-content" id="mainContent">

    <header class="top-header">
        <div class="header-left">
            <div class="header-page-title">🍱 Master Produk</div>
        </div>
        <div class="header-right">
            <div class="clock-pill">
                <div id="realtimeClock">00:00:00</div>
                <div id="realtimeDate">...</div>
            </div>
        </div>
    </header>

    <div class="page-body">

        <!-- FORM -->
        <div class="form-produk">
            <div class="grid-input">
                <div class="custom-select-wrap" id="wrapSKU" style="margin:0;">
                    <button class="custom-select-btn" onclick="toggleWrapSKU()" style="height:38px;">
                        <span id="labelSKU">Pilih SKU...</span>
                        <svg width="12" height="8" viewBox="0 0 12 8" fill="none"><path d="M1 1l5 5 5-5" stroke="#d32f2f" stroke-width="1.5" stroke-linecap="round"/></svg>
                    </button>
                    <div class="custom-dropdown" id="dropdownSKU"></div>
                    <input type="hidden" id="pSKU">
                </div>
                <input type="text"   id="pNama"  placeholder="Nama Menu (auto)" readonly style="background:var(--surface-2);">
                <input type="number" id="pHarga" placeholder="Harga Jual">
                <input type="number" id="pHPP"   placeholder="HPP (auto)" readonly style="background:var(--surface-2);color:var(--red);font-family:'DM Mono',monospace;font-weight:700;">
                <button class="btn-simpan" onclick="tambahProduk()">+ Simpan</button>
            </div>
        </div>

        <!-- TABLE -->
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th style="width:32px;">#</th>
                        <th>SKU</th>
                        <th>Nama Produk</th>
                        <th>Harga Jual</th>
                        <th>HPP</th>
                        <th>Margin</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="tabelProduk"></tbody>
            </table>
        </div>

    </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
    <button class="bn-item" onclick="location.href='dashboard.html'"><span class="bn-icon">🛒</span><span class="bn-label">Kasir</span></button>
    <button class="bn-item" onclick="location.href='history.html'"><span class="bn-icon">📄</span><span class="bn-label">History</span></button>
    <button class="bn-item" onclick="location.href='stok.html'"><span class="bn-icon">📦</span><span class="bn-label">Stok</span></button>
    <button class="bn-item" onclick="location.href='laporan_staff.html'"><span class="bn-icon">🚀</span><span class="bn-label">Laporan</span></button>
    <button class="bn-item active" onclick="openSheet('moreSheet')"><span class="bn-icon">☰</span><span class="bn-label">Lainnya</span></button>
</nav>

<!-- MORE SHEET -->
<div class="sheet-overlay" id="moreSheet" onclick="closeSheetOutside(event,'moreSheet')">
    <div class="bottom-sheet" onclick="event.stopPropagation()">
        <div class="sheet-handle"></div>
        <p style="font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:14px;">Menu Lainnya</p>
        <div class="more-grid" id="moreGrid"></div>
    </div>
</div>

<script>
const currentUser = JSON.parse(localStorage.getItem('currentUser')) || {user:'Guest', role:'Staff'};
if (!currentUser.user) window.location.href = 'index.html';
let editModeId = null;

/* ── SIDEBAR ── */
function toggleSidebar() {
    const sb = document.getElementById('sidebar');
    const mc = document.getElementById('mainContent');
    sb.classList.toggle('collapsed');
    mc.classList.toggle('expanded');
    localStorage.setItem('sidebarState', sb.classList.contains('collapsed') ? 'small' : 'large');
}

function buildSidebar() {
    if (localStorage.getItem('sidebarState') === 'small') {
        document.getElementById('sidebar').classList.add('collapsed');
        document.getElementById('mainContent').classList.add('expanded');
    }
    const role = currentUser.role;
    const cur  = window.location.pathname.split('/').pop() || 'dashboard.html';
    const navItem = (icon, label, link) => {
        const active = cur === link ? 'active' : '';
        return `<button class="nav-item ${active}" onclick="location.href='${link}'">
            <span class="nav-icon">${icon}</span>
            <span class="nav-label">${label}</span>
        </button>`;
    };
    const PAGES_FRONTLINE = ['dashboard.html','history.html','stok.html','restock.html','laporan_staff.html','edukasi.html'];
    const PAGES_MGMT      = ['rekap.html','produk.html'];
    const PAGES_EXEC      = ['laporan.html','statistik.html','bahan_baku.html','hpp_produk.html','belanja.html','warehouse.html','salary_staff.html','customer_hoki.html'];
    const PAGES_VIP       = ['user.html','login_history.html'];
    const PAGES_INVESTOR  = ['investor_omset.html','investor_profit.html'];
    const inGroup = pages => pages.includes(cur);
    const getOpen = (id, pages) => {
        const s = localStorage.getItem('navGroup_' + id);
        return s !== null ? s === '1' : true;
    };
    const GROUP_ICONS = { frontline:'🛒', management:'📊', executive:'📋', vip:'👑', investor:'🤝' };
    const navGroup = (id, label, items, pages) => {
        const open      = getOpen(id, pages);
        const hasActive = inGroup(pages);
        const icon      = GROUP_ICONS[id] || '📁';
        return `<div class="nav-group-wrap">
            <button class="nav-group-label${hasActive ? ' has-active' : ''}" onclick="toggleNavGroup('${id}')">
                <span class="nav-group-icon">${icon}</span>
                <span class="nav-group-text">${label}</span>
                <span class="nav-group-ti">${open ? '−' : '+'}</span>
            </button>
            <div class="nav-group-items" id="navg-${id}"${open ? '' : ' style="display:none"'}>
                ${items}
            </div>
        </div>`;
    };

    let frontline = navItem('🛒','Kasir','dashboard.html')
        + navItem('📄','History Transaksi','history.html')
        + navItem('📦','Stok Harian','stok.html')
        + navItem('🚚','Restock Barang','restock.html')
        + navItem('🚀','Laporan Penjualan','laporan_staff.html');
    let edukasiItem = navItem('📚','Edukasi & SOP','edukasi.html');
    frontline += edukasiItem;
    let h = '';
    if (role !== 'Investor') {
        h += navGroup('frontline', 'Frontline', frontline, PAGES_FRONTLINE);
    }

    if (['Senior Staff','SPV','Owner','VIP'].includes(role)) {
        let mgmt = navItem('🗓️','Rekapan Penjualan','rekap.html')
            + navItem('🍱','Master Produk','produk.html');
        h += navGroup('management', 'Management', mgmt, PAGES_MGMT);
    }
    if (['Owner','VIP'].includes(role)) {
        let exec = navItem('📊','Keuangan Global','laporan.html')
            + navItem('📈','Statistik','statistik.html')
            + navItem('🧂','Bahan Baku','bahan_baku.html')
            + navItem('🗃️','HPP Produk','hpp_produk.html')
            + navItem('🏭','Warehouse','warehouse.html')
            + navItem('📝','Belanja','belanja.html')
            + navItem('💵','Salary Staff','salary_staff.html')
            + navItem('👨‍👩‍👦','Customer Hoki','customer_hoki.html');
        h += navGroup('executive', 'Executive', exec, PAGES_EXEC);
    }
    if (['Owner','VIP','Investor'].includes(role)) {
        let inv = navItem('💹','Omset Cabang','investor_omset.html')
            + navItem('💰','Profit Sharing','investor_profit.html');
        h += navGroup('investor', 'Area Investor', inv, PAGES_INVESTOR);
    }
    if (role === 'VIP') {
        let vip = navItem('⚙️','manajemen User','user.html')
            + navItem('🔑','History Login','login_history.html');
        h += navGroup('vip', 'VIP Access', vip, PAGES_VIP);
    }
    document.getElementById('sidebarNav').innerHTML = h;
    const name = currentUser.user || '?';
    document.getElementById('userAvatarInitial').innerText = name.charAt(0).toUpperCase();
    document.getElementById('sidebarUserName').innerText   = name;
    document.getElementById('sidebarUserRole').innerText   = role;
}

function toggleNavGroup(id) {
    const items = document.getElementById('navg-' + id);
    const btn   = items.previousElementSibling;
    const ti    = btn.querySelector('.nav-group-ti');
    const open  = items.style.display !== 'none';
    items.style.display = open ? 'none' : '';
    if (ti) ti.textContent = open ? '+' : '−';
    localStorage.setItem('navGroup_' + id, open ? '0' : '1');
}



/* ── CLOCK ── */
function updateClock() {
    const now = new Date();
    document.getElementById('realtimeClock').innerText = now.toLocaleTimeString('id-ID');
    document.getElementById('realtimeDate').innerText  = now.toLocaleDateString('id-ID',{weekday:'short',year:'numeric',month:'short',day:'numeric'});
}
setInterval(updateClock, 1000);

/* ── MORE MENU ── */
function buildMoreMenu() {
    const role = currentUser.role;
    const items = [{icon:'🚚',label:'Restock',link:'restock.html'}];
    items.push({icon:'📚',label:'Edukasi & SOP',link:'edukasi.html'});
    if (['Senior Staff','SPV','Owner','VIP'].includes(role)) {
        items.push({icon:'🍱',label:'Produk',link:'produk.html'});
        items.push({icon:'📈',label:'Rekapan',link:'rekap.html'});
    }
    if (['Owner','VIP'].includes(role)) {
        items.push({icon:'🧂',label:'Bahan Baku',link:'bahan_baku.html'});
        items.push({icon:'🗃️',label:'HPP Produk',link:'hpp_produk.html'});
        items.push({icon:'🏭',label:'Warehouse',link:'warehouse.html'});
        items.push({icon:'📝',label:'Belanja',link:'belanja.html'});
        items.push({icon:'💵',label:'Salary Staff',link:'salary_staff.html'});
        items.push({icon:'📊',label:'Keuangan',link:'laporan.html'});
        items.push({icon:'📈',label:'Statistik',link:'statistik.html'});
        items.push({icon:'👨‍👩‍👦',label:'Customer Hoki',link:'customer_hoki.html'});
    }
    if (['Owner','VIP','Investor'].includes(role)) {
        items.push({icon:'💹',label:'Omset Cabang',link:'investor_omset.html'});
        items.push({icon:'💰',label:'Profit Sharing',link:'investor_profit.html'});
    }
    if (role === 'VIP') {
        items.push({icon:'⚙️',label:'Users',link:'user.html'});
        items.push({icon:'🔑',label:'Login Log',link:'login_history.html'});
    }
    items.push({icon:'🚪',label:'Logout',link:'#',action:'logout()'});
    document.getElementById('moreGrid').innerHTML = items.map(i =>
        `<button class="more-btn" onclick="${i.action||`location.href='${i.link}'`}">
            <span class="more-btn-icon">${i.icon}</span>
            <span class="more-btn-label">${i.label}</span>
        </button>`).join('');
}


function openSheet(id) { if(id==='moreSheet') buildMoreMenu(); document.getElementById(id).classList.add('open'); }
function closeSheetOutside(e,id) { if(e.target===document.getElementById(id)) document.getElementById(id).classList.remove('open'); }

/* ── LOGIKA PRODUK (TIDAK BERUBAH) ── */
async function muatProduk() {
    const res    = await fetch(`${API_BASE}?action=get_produk`);
    const produk = await res.json();
    window.allProduk = produk;

    const tbody = document.getElementById('tabelProduk');
    tbody.innerHTML = '';

    produk.forEach((p, index) => {
        const tr = document.createElement('tr');
        tr.setAttribute('draggable', 'true');
        tr.setAttribute('data-id', p.id);
        const hpp    = parseInt(p.hpp) || 0;
        const harga  = parseInt(p.harga) || 0;
        const margin = harga > 0 ? Math.round((harga - hpp) / harga * 100) : 0;
        const mColor = margin >= 30 ? 'var(--green)' : margin >= 15 ? 'var(--orange)' : 'var(--red)';
        tr.innerHTML = `
            <td><span class="drag-handle">☰</span></td>
            <td><span class="sku-badge">${p.sku}</span></td>
            <td>${p.nama}</td>
            <td><span class="harga-text">Rp ${harga.toLocaleString('id-ID')}</span></td>
            <td style="font-family:'DM Mono',monospace;font-size:12px;color:var(--text-muted);">Rp ${hpp.toLocaleString('id-ID')}</td>
            <td><span style="font-weight:700;color:${mColor};">${margin}%</span></td>
            <td>
                <button class="btn-edit-icon" onclick="siapkanEdit(${index})" title="Edit Data">✏️</button>
                <button class="btn-hapus-icon" onclick="hapusProduk(${p.id})" title="Hapus Data">🗑️</button>
            </td>`;
        tr.addEventListener('dragstart', handleDragStart);
        tr.addEventListener('dragover',  handleDragOver);
        tr.addEventListener('drop',      handleDrop);
        tr.addEventListener('dragend',   handleDragEnd);
        tbody.appendChild(tr);
    });
}

async function tambahProduk() {
    const data = {
        id:    editModeId,
        sku:   document.getElementById('pSKU').value.toUpperCase(),
        nama:  document.getElementById('pNama').value,
        harga: document.getElementById('pHarga').value,
        hpp:   document.getElementById('pHPP').value || 0
    };

    if (!data.sku || !data.nama || !data.harga) return toast.warning('Lengkapi SKU, Nama, dan Harga!');

    try {
        const res   = await fetch(`${API_BASE}?action=save_produk`, {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify(data)
        });
        const hasil = await res.json();
        if (hasil.status === 'success') {
            toast.success(editModeId ? 'Menu berhasil diupdate!' : 'Menu baru berhasil ditambah!');
            editModeId = null;
            document.querySelector('.btn-simpan').innerText = '+ Simpan';
            ['pHarga'].forEach(id => document.getElementById(id).value = '');
            document.getElementById('pSKU').value = '';
            document.getElementById('pNama').value = '';
            document.getElementById('pHPP').value = '';
            document.getElementById('labelSKU').innerText = 'Pilih SKU...';
            muatProduk();
        }
    } catch(e) {
        toast.error('Gagal menyimpan ke server!');
    }
}

function siapkanEdit(idx) {
    const p = window.allProduk[idx];
    editModeId = p.id;
    document.getElementById('pSKU').value   = p.sku;
    document.getElementById('labelSKU').innerText = p.sku;
    document.getElementById('pNama').value  = p.nama;
    document.getElementById('pHarga').value = p.harga;
    document.getElementById('pHPP').value   = p.hpp || 0;
    document.querySelector('.btn-simpan').innerText = '💾 UPDATE MENU';
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

async function hapusProduk(id) {
    const ok = await showConfirm('Hapus produk ini secara permanen?', 'Ya, Hapus', 'Batal', '🗑️');
    if (!ok) return;
    try {
        await fetch(`${API_BASE}?action=del_produk&id=${id}`);
        toast.success('Produk berhasil dihapus!');
        muatProduk();
    } catch(e) {
        toast.error('Gagal menghapus produk!');
    }
}

/* ── DRAG & DROP ── */
let dragSrcEl = null;

function handleDragStart(e) {
    dragSrcEl = this;
    e.dataTransfer.effectAllowed = 'move';
    this.style.opacity = '0.4';
}

function handleDragOver(e) {
    if (e.preventDefault) e.preventDefault();
    return false;
}

async function handleDrop(e) {
    if (e.stopPropagation) e.stopPropagation();
    if (dragSrcEl !== this) {
        const tbody = document.getElementById('tabelProduk');
        const rows  = Array.from(tbody.querySelectorAll('tr'));
        const fromIdx = rows.indexOf(dragSrcEl);
        const toIdx   = rows.indexOf(this);
        if (fromIdx < toIdx) { this.after(dragSrcEl); }
        else { this.before(dragSrcEl); }
        const newOrderIds = Array.from(tbody.querySelectorAll('tr')).map(tr => tr.getAttribute('data-id'));
        await fetch(`${API_BASE}?action=update_urutan`, {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({ ids: newOrderIds })
        });
    }
    return false;
}

function handleDragEnd() { this.style.opacity = '1'; }

async function logout() {
    const ok = await showConfirm('Logout dari sistem?', 'Ya, Logout', 'Batal', '🚪');
    if (ok) {
        localStorage.removeItem('currentUser');
        localStorage.removeItem('cabangHoki');
        window.location.href = 'index.html';
    }
}

function toggleWrapSKU() {
    document.getElementById('wrapSKU').classList.toggle('open');
}

async function muatDropdownSKU() {
    try {
        const res = await fetch(`${API_BASE}?action=get_hpp_produk`);
        const hpp = await res.json();
        const dropdown = document.getElementById('dropdownSKU');
        dropdown.innerHTML = '';
        hpp.forEach(h => {
            const item = document.createElement('div');
            item.className = 'dropdown-item';
            item.innerHTML = `<b>${h.sku}</b> — ${h.nama_produk}`;
            item.onclick = () => {
                document.getElementById('pSKU').value         = h.sku;
                document.getElementById('pNama').value        = h.nama_produk;
                document.getElementById('pHPP').value         = h.harga_pokok;
                document.getElementById('labelSKU').innerText = h.sku + ' — ' + h.nama_produk;
                document.querySelectorAll('#dropdownSKU .dropdown-item').forEach(i => i.classList.remove('active'));
                item.classList.add('active');
                document.getElementById('wrapSKU').classList.remove('open');
            };
            dropdown.appendChild(item);
        });
    } catch(e) { console.error(e); }
}

document.addEventListener('click', function(e) {
    const wrap = document.getElementById('wrapSKU');
    if (wrap && !wrap.contains(e.target)) wrap.classList.remove('open');
});

window.onload = () => {
    buildSidebar();
    updateClock();
    muatDropdownSKU();
    muatProduk();
};
</script>

<script src="session.js"></script>
<script src="toast.js"></script>
</body>
</html>
