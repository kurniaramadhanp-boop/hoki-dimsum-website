<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hoki POS - Statistik</title>
        <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥟</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&family=DM+Mono:wght@400;500&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=20260501">
    <style>

    /* ── FILTER ── */
    .filter-container {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--r-lg);
        padding: 16px 20px;
        margin-bottom: 12px;
        display: flex;
        flex-wrap: nowrap;
        align-items: flex-end;
        gap: 12px;
        box-shadow: var(--sh-sm);
    }

    .filter-container .custom-select-btn,
    .filter-container input[type="date"] {
        height: 42px;
    }

    .filter-container .custom-select-wrap {
        margin-bottom: 0;
    }

    .filter-group {
        display: flex;
        flex-direction: column;
        gap: 4px;
        flex: 1;
    }

    .filter-group label {
        font-size: 10px;
        font-weight: 700;
        color: var(--red);
        text-transform: uppercase;
        letter-spacing: 0.8px;
        margin: 0;
    }

    /* ── GRID ── */
    .grid-dashboard {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 16px;
    }

    /* ── CARDS ── */
    .card-insight {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--r-lg);
        padding: 20px;
        box-shadow: var(--sh-sm);
    }

    .card-insight h3 {
        margin: 0 0 16px;
        font-size: 13px;
        font-weight: 700;
        color: var(--text);
        border-bottom: 1px solid var(--border);
        padding-bottom: 10px;
    }

    /* ── ARUS KAS ── */
    .kas-row {
        display: flex;
        justify-content: space-between;
        margin-bottom: 14px;
    }

    .kas-item {
        display: flex;
        flex-direction: column;
        gap: 2px;
    }

    .label-small {
        font-size: 11px;
        color: var(--text-muted);
    }

    .highlight-text {
        font-family: 'DM Mono', monospace;
        font-size: 20px;
        font-weight: 700;
        color: var(--red);
    }

    .highlight-text.green {
        color: var(--green);
    }

    .profit-info {
        font-size: 12px;
        color: var(--text-muted);
        text-align: center;
        font-weight: 600;
        margin-top: 10px;
    }

    /* ── CABANG CHART ── */
    .cabang-row {
        margin-bottom: 12px;
    }

    .cabang-row-header {
        display: flex;
        justify-content: space-between;
        font-size: 12px;
        margin-bottom: 4px;
    }

    .cabang-row-header span {
        color: var(--text);
    }

    .cabang-row-header b {
        font-family: 'DM Mono', monospace;
        color: var(--red);
    }

    /* ── JAM CHART ── */
    .jam-chart {
        display: flex;
        align-items: flex-end;
        height: 80px;
        gap: 3px;
        margin-top: 8px;
    }

    .jam-bar-wrap {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    .jam-bar-bg {
        background: var(--surface-2);
        width: 100%;
        height: 70px;
        display: flex;
        align-items: flex-end;
        border-radius: 3px 3px 0 0;
        overflow: hidden;
        border: 1px solid var(--border);
    }

    .jam-bar-fill {
        background: var(--red);
        width: 100%;
        transition: height 0.5s ease;
    }

    .jam-label {
        font-size: 8px;
        color: var(--text-muted);
        margin-top: 4px;
    }

    .jam-time-row {
        display: flex;
        justify-content: space-between;
        margin-top: 6px;
    }

    /* ── TOP MENU TABLE ── */
    .top-menu-table {
        width: 100%;
        border-collapse: collapse;
        background: transparent;
        box-shadow: none;
        border: none;
        border-radius: 0;
    }

    .top-menu-table td {
        padding: 9px 0;
        border-bottom: 1px solid var(--border);
        font-size: 13px;
        color: var(--text);
        border-top: none;
        border-left: none;
        border-right: none;
        background: transparent;
    }

    .top-menu-table tr:last-child td {
        border-bottom: none;
    }

    .top-menu-table .qty-cell {
        text-align: right;
        font-weight: 700;
        font-family: 'DM Mono', monospace;
        color: var(--red);
        white-space: nowrap;
    }

    /* ── RESPONSIVE MOBILE ── */
    @media (max-width: 844px) {

        .grid-dashboard {
            grid-template-columns: 1fr;
        }

        .filter-container {
            flex-direction: column;
            align-items: stretch;
        }

    }


    @media print {
        .sidebar, .bottom-nav, .filter-container, .btn-cetak-pdf { display: none !important; }
        .main-content { margin: 0 !important; }
        .page-body { padding: 16px !important; }
    }
    </style>
  <script src="config.js"></script>
</head>
<body>

<!-- ── SIDEBAR ── -->
<aside class="sidebar" id="sidebar">
    <div class="sidebar-brand" onclick="toggleSidebar()">
        <div class="sidebar-logo">
            <img src="Assets/logobrand.png" alt="Hoki">
        </div>
        <div class="sidebar-brand-text">
            <div class="sidebar-brand-name">Hoki Dimsum</div>
            <div class="sidebar-brand-sub">POS System v2.0</div>
        </div>
    </div>
    <button class="sidebar-toggle" onclick="toggleSidebar()">‹</button>
    <nav class="sidebar-nav" id="sidebarNav"></nav>
    <div class="sidebar-user">
        <div class="user-card">
            <div class="user-avatar" id="userAvatarInitial">?</div>
            <div class="user-info">
                <div class="user-name" id="sidebarUserName">Loading...</div>
                <div class="user-role" id="sidebarUserRole">—</div>
            </div>
            <button class="btn-logout-icon" onclick="logout()" title="Logout">🚪</button>
        </div>
    </div>
</aside>

<!-- ── MAIN CONTENT ── -->
<div class="main-content" id="mainContent">

    <header class="top-header">
        <div class="header-left">
            <div class="header-page-title">📈 Statistik</div>
        </div>
        <div class="header-right">
            <button class="btn-cetak-pdf" onclick="cetakPDF()">🖨️ Cetak PDF</button>
            <div class="clock-pill">
                <div id="realtimeClock">00:00:00</div>
                <div id="realtimeDate">...</div>
            </div>
        </div>
    </header>

    <div class="page-body">

        <!-- FILTER -->
        <div class="filter-container">
            <div class="filter-group">
                <label for="wrapCabang">📍 Cabang</label>
                <div class="custom-select-wrap" id="wrapCabang">
                    <button class="custom-select-btn" onclick="toggleDropdown('wrapCabang')">
                        <span id="iconCabang">📍</span>
                        <span id="labelCabang">Semua Cabang</span>
                        <svg width="12" height="8" viewBox="0 0 12 8" fill="none"><path d="M1 1l5 5 5-5" stroke="#d32f2f" stroke-width="1.5" stroke-linecap="round"/></svg>
                    </button>
                    <div class="custom-dropdown" id="dropdownCabang">
                        <div class="dropdown-item active" onclick="pilihCabang('Semua','📍','Semua Cabang',this)">
                            <span class="dd-icon">📍</span><span>Semua Cabang</span>
                        </div>
                    </div>
                    <input type="hidden" id="filterCabang" value="Semua">
                </div>
            </div>
            <div class="filter-group">
                <label for="startDate">📅 Dari Tanggal</label>
                <input type="date" id="startDate" onchange="loadStatistik()" style="height:42px;">
            </div>
            <div class="filter-group">
                <label for="endDate">📅 Sampai Tanggal</label>
                <input type="date" id="endDate" onchange="loadStatistik()" style="height:42px;">
            </div>
            <div class="filter-group" style="flex:0;">
                <label style="visibility:hidden;">x</label>
                <button class="btn-reset" onclick="resetFilter()" style="height:42px;white-space:nowrap;">Reset</button>
            </div>
        </div>

        <!-- GRID CARDS -->
        <div class="grid-dashboard">

            <div class="card-insight">
                <h3>💰 Arus Kas (In vs Out)</h3>
                <div class="kas-row">
                    <div class="kas-item">
                        <span class="label-small">Pemasukan (Laporan Staff)</span>
                        <div id="valIn" class="highlight-text green">Rp 0</div>
                    </div>
                    <div class="kas-item" style="text-align:right;">
                        <span class="label-small">Pengeluaran (Buku Kas)</span>
                        <div id="valOut" class="highlight-text">Rp 0</div>
                    </div>
                </div>
                <div class="bar-container" style="height:12px;">
                    <div id="barProfit" class="bar-fill green" style="width:0%;"></div>
                </div>
                <p id="profitInfo" class="profit-info"></p>
            </div>

            <div class="card-insight">
                <h3>🏆 Performa Omset Cabang</h3>
                <div id="chartCabang"></div>
            </div>

            <div class="card-insight">
                <h3>⏰ Jam Paling Ramai (Rush Hour)</h3>
                <div class="jam-chart" id="chartJam"></div>
                <div class="jam-time-row">
                    <span class="label-small">07:00</span>
                    <span class="label-small">15:00</span>
                    <span class="label-small">22:00</span>
                </div>
            </div>

            <div class="card-insight">
                <h3>🔥 Jawara Menu (Top 5)</h3>
                <div style="overflow-x:auto;-webkit-overflow-scrolling:touch;">
                <table class="top-menu-table">
                    <tbody id="listProdukUnggulan"></tbody>
                </table>
                </div>
            </div>

        </div>
    </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
    <button class="bn-item" onclick="location.href='dashboard.html'"><span class="bn-icon">🛒</span><span class="bn-label">Kasir</span></button>
    <button class="bn-item" onclick="location.href='history.html'"><span class="bn-icon">📄</span><span class="bn-label">History</span></button>
    <button class="bn-item" onclick="location.href='stok.html'"><span class="bn-icon">📦</span><span class="bn-label">Stok</span></button>
    <button class="bn-item" onclick="location.href='laporan_staff.html'"><span class="bn-icon">📊</span><span class="bn-label">Laporan</span></button>
    <button class="bn-item active" onclick="openSheet('moreSheet')"><span class="bn-icon">☰</span><span class="bn-label">Lainnya</span></button>
</nav>

<!-- MORE SHEET -->
<div class="sheet-overlay" id="moreSheet" onclick="closeSheetOutside(event,'moreSheet')">
    <div class="bottom-sheet" onclick="event.stopPropagation()">
        <div class="sheet-handle"></div>
        <p style="font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:14px;">Menu Lainnya</p>
        <div class="more-grid" id="moreGrid"></div>
    </div>
</div>

<script>
const currentUser = JSON.parse(localStorage.getItem('currentUser')) || {user:'Guest', role:'Staff', cabang:''};
if (!currentUser.user) window.location.href = 'index.html';

/* ── SIDEBAR ── */
function toggleSidebar() {
    const sb = document.getElementById('sidebar');
    const mc = document.getElementById('mainContent');
    sb.classList.toggle('collapsed');
    mc.classList.toggle('expanded');
    localStorage.setItem('sidebarState', sb.classList.contains('collapsed') ? 'small' : 'large');
}

function buildSidebar() {
    if (localStorage.getItem('sidebarState') === 'small') {
        document.getElementById('sidebar').classList.add('collapsed');
        document.getElementById('mainContent').classList.add('expanded');
    }
    const role = currentUser.role;
    const cur  = window.location.pathname.split('/').pop() || 'dashboard.html';
    const navItem = (icon, label, link) => {
        const active = cur === link ? 'active' : '';
        return `<button class="nav-item ${active}" onclick="location.href='${link}'">
            <span class="nav-icon">${icon}</span>
            <span class="nav-label">${label}</span>
        </button>`;
    };
    const PAGES_FRONTLINE = ['dashboard.html','history.html','stok.html','restock.html','laporan_staff.html'];
    const PAGES_MGMT      = ['rekap.html','produk.html'];
    const PAGES_EXEC      = ['laporan.html','statistik.html','bahan_baku.html','hpp_produk.html','belanja.html','warehouse.html','salary_staff.html'];
    const PAGES_VIP       = ['user.html','login_history.html'];
    const PAGES_INVESTOR  = ['investor_omset.html','investor_profit.html'];
    const inGroup = pages => pages.includes(cur);
    const getOpen = (id, pages) => {
        const s = localStorage.getItem('navGroup_' + id);
        return s !== null ? s === '1' : true;
    };
    const GROUP_ICONS = { frontline:'🛒', management:'📊', executive:'📋', vip:'👑', investor:'🤝' };
    const navGroup = (id, label, items, pages) => {
        const open      = getOpen(id, pages);
        const hasActive = inGroup(pages);
        const icon      = GROUP_ICONS[id] || '📁';
        return `<div class="nav-group-wrap">
            <button class="nav-group-label${hasActive ? ' has-active' : ''}" onclick="toggleNavGroup('${id}')">
                <span class="nav-group-icon">${icon}</span>
                <span class="nav-group-text">${label}</span>
                <span class="nav-group-ti">${open ? '−' : '+'}</span>
            </button>
            <div class="nav-group-items" id="navg-${id}"${open ? '' : ' style="display:none"'}>
                ${items}
            </div>
        </div>`;
    };

    let frontline = navItem('🛒','Kasir','dashboard.html')
        + navItem('📄','History Transaksi','history.html')
        + navItem('📦','Stok Harian','stok.html')
        + navItem('🚚','Restock Barang','restock.html')
        + navItem('📊','Laporan Penjualan','laporan_staff.html');
    let h = '';
    if (role !== 'Investor') {
        h += navGroup('frontline', 'Frontline', frontline, PAGES_FRONTLINE);
    }

    if (['Senior Staff','SPV','Owner','VIP'].includes(role)) {
        let mgmt = navItem('📈','Rekapan Penjualan','rekap.html')
            + navItem('🍱','Master Produk','produk.html');
        h += navGroup('management', 'Management', mgmt, PAGES_MGMT);
    }
    if (['Owner','VIP'].includes(role)) {
        let exec = navItem('📊','Keuangan Global','laporan.html')
            + navItem('📈','Statistik','statistik.html')
            + navItem('🧂','Bahan Baku','bahan_baku.html')
            + navItem('💰','HPP Produk','hpp_produk.html')
            + navItem('🏭','Warehouse','warehouse.html')
            + navItem('💸','Belanja','belanja.html')
            + navItem('💵','Salary Staff','salary_staff.html');
        h += navGroup('executive', 'Executive', exec, PAGES_EXEC);
    }
    if (['Owner','VIP','Investor'].includes(role)) {
        let inv = navItem('📈','Omset Cabang','investor_omset.html')
            + navItem('💰','Profit Sharing','investor_profit.html');
        h += navGroup('investor', 'Area Investor', inv, PAGES_INVESTOR);
    }
    if (role === 'VIP') {
        let vip = navItem('👥','Manajemen User','user.html')
            + navItem('🔑','History Login','login_history.html');
        h += navGroup('vip', 'VIP Access', vip, PAGES_VIP);
    }
    document.getElementById('sidebarNav').innerHTML = h;
    const name = currentUser.user || '?';
    document.getElementById('userAvatarInitial').innerText = name.charAt(0).toUpperCase();
    document.getElementById('sidebarUserName').innerText   = name;
    document.getElementById('sidebarUserRole').innerText   = role;
}

function toggleNavGroup(id) {
    const items = document.getElementById('navg-' + id);
    const btn   = items.previousElementSibling;
    const ti    = btn.querySelector('.nav-group-ti');
    const open  = items.style.display !== 'none';
    items.style.display = open ? 'none' : '';
    if (ti) ti.textContent = open ? '+' : '−';
    localStorage.setItem('navGroup_' + id, open ? '0' : '1');
}



/* ── CLOCK ── */
function updateClock() {
    const now = new Date();
    document.getElementById('realtimeClock').innerText = now.toLocaleTimeString('id-ID');
    document.getElementById('realtimeDate').innerText  = now.toLocaleDateString('id-ID',{weekday:'short',year:'numeric',month:'short',day:'numeric'});
}
setInterval(updateClock, 1000);

/* ── MORE MENU ── */
function buildMoreMenu() {
    const role = currentUser.role;
    const items = [{icon:'🚚',label:'Restock',link:'restock.html'}];
    if (['Senior Staff','SPV','Owner','VIP'].includes(role)) {
        items.push({icon:'📈',label:'Rekapan',link:'rekap.html'});
    }
    if (['Owner','VIP'].includes(role)) {
        items.push({icon:'🍱',label:'Produk',link:'produk.html'});
        items.push({icon:'🧂',label:'Bahan Baku',link:'bahan_baku.html'});
        items.push({icon:'💰',label:'HPP Produk',link:'hpp_produk.html'});
        items.push({icon:'🏭',label:'Warehouse',link:'warehouse.html'});
        items.push({icon:'💸',label:'Belanja',link:'belanja.html'});
        items.push({icon:'💵',label:'Salary Staff',link:'salary_staff.html'});
        items.push({icon:'📊',label:'Keuangan',link:'laporan.html'});
        items.push({icon:'📈',label:'Statistik',link:'statistik.html'});
    }
    if (['Owner','VIP','Investor'].includes(role)) {
        items.push({icon:'📈',label:'Omset Cabang',link:'investor_omset.html'});
        items.push({icon:'💰',label:'Profit Sharing',link:'investor_profit.html'});
    }
    if (role === 'VIP') {
        items.push({icon:'👥',label:'Users',link:'user.html'});
        items.push({icon:'🔑',label:'Login Log',link:'login_history.html'});
    }
    items.push({icon:'🚪',label:'Logout',link:'#',action:'logout()'});
    document.getElementById('moreGrid').innerHTML = items.map(i =>
        `<button class="more-btn" onclick="${i.action||`location.href='${i.link}'`}">
            <span class="more-btn-icon">${i.icon}</span>
            <span class="more-btn-label">${i.label}</span>
        </button>`).join('');
}


function openSheet(id) { if(id==='moreSheet') buildMoreMenu(); document.getElementById(id).classList.add('open'); }
function closeSheetOutside(e,id) { if(e.target===document.getElementById(id)) document.getElementById(id).classList.remove('open'); }

/* ── LOGIKA STATISTIK (TIDAK BERUBAH) ── */
/* ── CUSTOM DROPDOWN HELPERS ── */
function toggleDropdown(wrapId) {
    document.querySelectorAll('.custom-select-wrap.open').forEach(w => {
        if (w.id !== wrapId) w.classList.remove('open');
    });
    document.getElementById(wrapId).classList.toggle('open');
}

function pilihCabang(value, icon, label, el) {
    document.getElementById('filterCabang').value = value;
    document.getElementById('iconCabang').innerText = icon;
    document.getElementById('labelCabang').innerText = label;
    document.querySelectorAll('#dropdownCabang .dropdown-item').forEach(i => i.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('wrapCabang').classList.remove('open');
    loadStatistik();
}

document.addEventListener('click', function(e) {
    document.querySelectorAll('.custom-select-wrap').forEach(wrap => {
        if (!wrap.contains(e.target)) wrap.classList.remove('open');
    });
});

async function loadFilters() {
    try {
        const res  = await fetch(`${API_BASE}?action=get_branches`);
        const data = await res.json();
        const dropdown = document.getElementById('dropdownCabang');
        dropdown.innerHTML = `<div class="dropdown-item active" onclick="pilihCabang('Semua','📍','Semua Cabang',this)"><span class="dd-icon">📍</span><span>Semua Cabang</span></div>`;
        data.forEach(c => {
            dropdown.innerHTML += `<div class="dropdown-item" onclick="pilihCabang('${c.nama_cabang}','🏪','${c.nama_cabang}',this)"><span class="dd-icon">🏪</span><span>${c.nama_cabang}</span></div>`;
        });
    } catch (e) { console.error("Gagal muat cabang cloud."); }
}

async function loadStatistik() {
    
    try {
        const [resHistory, resSettlement, resKas] = await Promise.all([
            fetch(`${API_BASE}?action=get_history&tgl_mulai=${startStr}&tgl_selesai=${endStr}`),
            fetch(`${API_BASE}?action=get_laporan_history&role=Owner&cabang=Semua`),
            fetch(`${API_BASE}?action=get_kas_data&role=Owner&cabang=Semua`)
        ]);

        const transaksi  = await resHistory.json();
        const lapStaff   = await resSettlement.json();
        const kasData    = await resKas.json();

        const cabFilter  = document.getElementById('filterCabang').value;
        const startStr   = document.getElementById('startDate').value;
        const endStr     = document.getElementById('endDate').value;
        const startTime  = startStr ? new Date(startStr).setHours(0,0,0,0)   : null;
        const endTime    = endStr   ? new Date(endStr).setHours(23,59,59,999) : null;

        /* A. ARUS KAS */
        let totalIn = 0;
        lapStaff.forEach(l => {
            const d = new Date(l.waktu).getTime();
            if ((cabFilter === 'Semua' || l.cabang === cabFilter) && (!startTime || d >= startTime) && (!endTime || d <= endTime)) {
                totalIn += parseFloat(l.grand_total || 0);
            }
        });

        let totalOut = 0;
        kasData.forEach(k => {
            const d = new Date(k.waktu).getTime();
            if ((cabFilter === 'Semua' || k.cabang === cabFilter) && (!startTime || d >= startTime) && (!endTime || d <= endTime) && k.mode === 'Debit') {
                totalOut += parseFloat(k.nominal || 0);
            }
        });

        document.getElementById('valIn').innerText  = "Rp " + totalIn.toLocaleString();
        document.getElementById('valOut').innerText = "Rp " + totalOut.toLocaleString();
        const profit  = totalIn - totalOut;
        const ratio   = totalIn > 0 ? (profit / totalIn) * 100 : 0;
        const barEl   = document.getElementById('barProfit');
        barEl.style.width      = Math.max(0, Math.min(100, ratio)) + "%";
        barEl.style.background = profit >= 0 ? 'var(--green)' : 'var(--red)';
        document.getElementById('profitInfo').innerText = `Laba Bersih: Rp ${profit.toLocaleString()} (${ratio.toFixed(1)}%)`;

        /* B. PERFORMA CABANG */
        let perCabang = {};
        lapStaff.forEach(l => {
            const d = new Date(l.waktu).getTime();
            if ((!startTime || d >= startTime) && (!endTime || d <= endTime)) {
                perCabang[l.cabang] = (perCabang[l.cabang] || 0) + parseFloat(l.grand_total || 0);
            }
        });
        const chartCab = document.getElementById('chartCabang');
        chartCab.innerHTML = '';
        const maxCab = Math.max(...Object.values(perCabang), 1);
        Object.entries(perCabang).sort((a,b) => b[1]-a[1]).forEach(([name, val]) => {
            const p = (val / maxCab) * 100;
            chartCab.innerHTML += `
                <div class="cabang-row">
                    <div class="cabang-row-header">
                        <span>${name}</span>
                        <b>Rp ${val.toLocaleString()}</b>
                    </div>
                    <div class="bar-container">
                        <div class="bar-fill" style="width:${p}%"></div>
                    </div>
                </div>`;
        });

        /* C. JAM & TOP MENU */
        const trxArr = Array.isArray(transaksi) ? transaksi : [];
        let jamData = {}, menuData = {};
        trxArr.forEach(t => {
            try {
                const d     = new Date(t.waktu).getTime();
                const mCab  = (cabFilter === 'Semua' || t.cabang === cabFilter);
                const mDate = (!startTime || d >= startTime) && (!endTime || d <= endTime);
                if (mCab && mDate) {
                    const jam = new Date(t.waktu).getHours();
                    jamData[jam] = (jamData[jam] || 0) + 1;
                    let items = [];
                    try { const p = JSON.parse(t.items_json || '[]'); items = Array.isArray(p) ? p : []; } catch(_) {}
                    items.forEach(item => {
                        const nama = item.nama || item.sku || '?';
                        if (nama !== '?') menuData[nama] = (menuData[nama] || 0) + (parseInt(item.qty) || 1);
                    });
                }
            } catch(_) {}
        });

        const chartJam = document.getElementById('chartJam');
        chartJam.innerHTML = '';
        const maxJam = Math.max(...Object.values(jamData), 1);
        for (let h = 7; h <= 22; h++) {
            const cnt = jamData[h] || 0;
            const p   = (cnt / maxJam) * 100;
            chartJam.innerHTML += `
                <div class="jam-bar-wrap">
                    <div class="jam-bar-bg">
                        <div class="jam-bar-fill" style="height:${p}%;"></div>
                    </div>
                    <span class="jam-label">${h}</span>
                </div>`;
        }
        if (Object.keys(jamData).length === 0) {
            chartJam.innerHTML = `<p style="font-size:12px;color:var(--text-light);padding:8px 0;">Belum ada data transaksi</p>`;
        }

        const listP = document.getElementById('listProdukUnggulan');
        listP.innerHTML = '';
        const topMenu = Object.entries(menuData).sort((a,b) => b[1]-a[1]).slice(0,5);
        if (topMenu.length === 0) {
            listP.innerHTML = `<tr><td colspan="2" style="font-size:12px;color:var(--text-light);padding:8px 0;">Belum ada data menu</td></tr>`;
        } else {
            topMenu.forEach(([name, qty]) => {
                listP.innerHTML += `
                    <tr>
                        <td>${name}</td>
                        <td class="qty-cell">${qty} <small style="font-size:10px;color:var(--text-muted);font-weight:400;">Porsi</small></td>
                    </tr>`;
            });
        }

    } catch (e) { console.error("Gagal sinkron statistik cloud:", e); }
}

function resetFilter() {
    document.getElementById('startDate').value = '';
    document.getElementById('endDate').value   = '';
    pilihCabang('Semua', '📍', 'Semua Cabang', document.querySelector('#dropdownCabang .dropdown-item'));
}

function cetakPDF() {
    window.print();
}

async function logout() {
    const ok = await showConfirm('Logout dari sistem?', 'Ya, Logout', 'Batal', '🚪');
    if (ok) {
        localStorage.removeItem('currentUser');
        localStorage.removeItem('cabangHoki');
        window.location.href = 'index.html';
    }
}

    buildSidebar();
    updateClock();
    await loadFilters();
    loadStatistik();
};
