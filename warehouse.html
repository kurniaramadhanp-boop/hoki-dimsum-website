<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hoki POS - Warehouse</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥟</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&family=DM+Mono:wght@400;500&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=20260501">
    <style>

    .btn-hapus-icon {
        background: #fff5f5;
        border: 1px solid #feb2b2;
        color: var(--red);
        padding: 4px 8px;
        border-radius: var(--r-sm);
        cursor: pointer;
        font-size: 14px;
        transition: all 0.2s;
    }
    
    .btn-hapus-icon:hover {
        background: var(--red);
        color: white;
    }
    
    .wh-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--r-lg);
        box-shadow: var(--sh-sm);
        padding: 16px;
        margin-bottom: 12px;
    }

    .wh-card-title {
        font-size: 10px;
        font-weight: 700;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.8px;
        margin-bottom: 12px;
    }

    /* Produk selector row */
    .wh-selector-row {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
    }

    .wh-selector-row .custom-select-wrap {
        flex: 1;
        min-width: 180px;
        margin-bottom: 0;
    }

    .wh-selector-row .custom-select-btn {
        height: 40px;
        padding: 0 12px;
        border: 1.5px solid var(--border);
        border-radius: var(--r-md);
        border-width: 1.5px;
        font-size: 14px;
        font-weight: 500;
    }

    .wh-sisa-badge {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 14px;
        border-radius: var(--r-md);
        background: var(--surface-2);
        border: 1px solid var(--border);
        white-space: nowrap;
    }
    .wh-sisa-badge .lbl {
        font-size: 11px;
        color: var(--text-muted);
        font-weight: 600;
    }
    .wh-sisa-badge .val {
        font-family: 'DM Mono', monospace;
        font-size: 18px;
        font-weight: 700;
        line-height: 1;
    }
    .wh-sisa-badge .val.ok     { color: #16a34a; }
    .wh-sisa-badge .val.warn   { color: #ca8a04; }
    .wh-sisa-badge .val.danger { color: var(--red); }

    /* Form input masuk */
    .wh-form-row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: flex-end;
    }

    .wh-form-group {
        display: flex;
        flex-direction: column;
        gap: 5px;
    }

    .wh-form-group label {
        font-size: 10px;
        font-weight: 700;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    .wh-form-group input {
        height: 38px;
        padding: 0 12px;
        border: 1.5px solid var(--border);
        border-radius: var(--r-md);
        font-size: 13px;
        font-family: 'DM Sans', sans-serif;
        background: var(--surface);
        color: var(--text);
        outline: none;
        transition: border-color 0.15s;
    }
    .wh-form-group input:focus { border-color: var(--red); }

    /* Table */
    .wh-table-wrap {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
    }

    .wh-tbl {
        width: 100%;
        border-collapse: collapse;
        min-width: 500px;
    }

    .wh-tbl thead th {
        background: var(--red);
        color: white;
        padding: 11px 14px;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        text-align: left;
        white-space: nowrap;
    }

    .wh-tbl tbody td {
        padding: 11px 14px;
        border-bottom: 1px solid var(--border);
        font-size: 13px;
        color: var(--text);
        vertical-align: middle;
    }

    .wh-tbl tbody tr:last-child td { border-bottom: none; }
    .wh-tbl tbody tr.latest td { background: #fff5f5; }

    .mono { font-family: 'DM Mono', monospace; font-size: 12px; }
    .val-masuk  { color: #16a34a; font-weight: 700; }
    .val-keluar { color: var(--red); font-weight: 700; }
    .val-ok     { color: #16a34a; font-weight: 700; }
    .val-warn   { color: #ca8a04; font-weight: 700; }
    .val-danger { color: var(--red); font-weight: 700; }

    .wh-empty-td {
        text-align: center;
        padding: 40px 20px !important;
        color: var(--text-light);
        font-size: 13px;
    }

    .terbaru-badge {
        display: inline-block;
        margin-left: 6px;
        font-size: 9px;
        background: var(--red);
        color: white;
        padding: 1px 6px;
        border-radius: 99px;
        vertical-align: middle;
    }

    @media (max-width: 640px) {
        .wh-form-row { flex-direction: column; }
        .wh-form-group { width: 100%; }
        .wh-selector-row { flex-direction: column; align-items: stretch; }
        .wh-selector-row .custom-select-wrap { min-width: 0; width: 100%; }
        .wh-sisa-badge { justify-content: space-between; }
    }

    </style>
  <script src="config.js"></script>
</head>
<body>

<!-- ── SIDEBAR ── -->
<aside class="sidebar" id="sidebar">
    <div class="sidebar-brand" onclick="toggleSidebar()">
        <div class="sidebar-logo">
            <img src="Assets/logobrand.png" alt="Hoki">
        </div>
        <div class="sidebar-brand-text">
            <div class="sidebar-brand-name">Hoki Dimsum</div>
            <div class="sidebar-brand-sub">POS System v2.0</div>
        </div>
    </div>
    <button class="sidebar-toggle" onclick="toggleSidebar()">‹</button>
    <nav class="sidebar-nav" id="sidebarNav"></nav>
    <div class="sidebar-user">
        <div class="user-card">
            <div class="user-avatar" id="userAvatarInitial">?</div>
            <div class="user-info">
                <div class="user-name" id="sidebarUserName">Loading...</div>
                <div class="user-role" id="sidebarUserRole">—</div>
            </div>
            <button class="btn-logout-icon" onclick="logout()" title="Logout">🚪</button>
        </div>
    </div>
</aside>

<!-- ── MAIN CONTENT ── -->
<div class="main-content" id="mainContent">

    <header class="top-header">
        <div class="header-left">
            <div class="header-page-title">🏭 Warehouse</div>
        </div>
        <div class="header-right">
            <div class="clock-pill">
                <div id="realtimeClock">00:00:00</div>
                <div id="realtimeDate">...</div>
            </div>
        </div>
    </header>

    <div class="page-body">

        <!-- PILIH PRODUK + SISA STOK -->
        <div class="wh-card">
            <div class="wh-card-title">🧂 Pilih Bahan Baku</div>
            <div class="wh-selector-row">
                <div class="custom-select-wrap" id="wrapProdukWH">
                    <button class="custom-select-btn" onclick="toggleDropdownWH()">
                        <span id="labelProdukWH">— Pilih Bahan Baku —</span>
                        <svg width="12" height="8" viewBox="0 0 12 8" fill="none"><path d="M1 1l5 5 5-5" stroke="#d32f2f" stroke-width="1.5" stroke-linecap="round"/></svg>
                    </button>
                    <div class="custom-dropdown" id="dropdownProdukWH"></div>
                </div>
                <div class="wh-sisa-badge" id="sisaBadge" style="display:none;">
                    <span class="lbl">Sisa Stok</span>
                    <span class="val" id="sisaVal">—</span>
                </div>
            </div>
        </div>

        <!-- FORM TAMBAH STOK MASUK -->
        <div class="wh-card" id="formCard" style="display:none;">
            <div class="wh-card-title">➕ Tambah Stok Masuk</div>
            <div class="wh-form-row">
                <div class="wh-form-group">
                    <label for="masukTgl">Tanggal</label>
                    <input type="date" id="masukTgl">
                </div>
                <div class="wh-form-group">
                    <label for="masukQty">Jumlah Masuk</label>
                    <input type="number" id="masukQty" min="1" step="1" placeholder="0" style="width:120px;">
                </div>
                <div class="wh-form-group" style="flex:1;min-width:160px;">
                    <label for="masukCatatan">Catatan (opsional)</label>
                    <input type="text" id="masukCatatan" placeholder="Cth: Kiriman dari pusat">
                </div>
                <button class="btn-simpan" onclick="tambahMasuk()" style="height:38px;align-self:flex-end;white-space:nowrap;">💾 Simpan</button>
            </div>
        </div>

        <!-- TABEL LEDGER -->
        <div class="wh-card" id="tableCard" style="display:none;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
                <div class="wh-card-title" style="margin-bottom:0;">📋 Riwayat Stok</div>
                <span id="ledgerCount" style="font-size:11px;color:var(--text-light);"></span>
            </div>
            <div class="wh-table-wrap">
                <table class="wh-tbl">
                    <thead>
                        <tr>
                            <th>Waktu</th>
                            <th>Keterangan</th>
                            <th>Masuk</th>
                            <th>Keluar</th>
                            <th>Sisa</th>
                            <th style="width: 40px; text-align:center;">Aksi</th> <!-- Tambah kolom ini -->
                        </tr>
                    </thead>
                    <tbody id="ledgerTbody">
                        <tr><td class="wh-empty-td" colspan="6">Pilih produk untuk melihat riwayat.</td></tr> <!-- Colspan ganti ke 6 -->
                    </tbody>
                    <tbody id="ledgerTbody">
                        <tr><td class="wh-empty-td" colspan="5">Pilih produk untuk melihat riwayat.</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
    <button class="bn-item" onclick="location.href='dashboard.html'"><span class="bn-icon">🛒</span><span class="bn-label">Kasir</span></button>
    <button class="bn-item" onclick="location.href='history.html'"><span class="bn-icon">📄</span><span class="bn-label">History</span></button>
    <button class="bn-item" onclick="location.href='stok.html'"><span class="bn-icon">📦</span><span class="bn-label">Stok</span></button>
    <button class="bn-item" onclick="location.href='laporan_staff.html'"><span class="bn-icon">📊</span><span class="bn-label">Laporan</span></button>
    <button class="bn-item active" onclick="openSheet('moreSheet')"><span class="bn-icon">☰</span><span class="bn-label">Lainnya</span></button>
</nav>

<!-- MORE SHEET -->
<div class="sheet-overlay" id="moreSheet" onclick="closeSheetOutside(event,'moreSheet')">
    <div class="bottom-sheet" onclick="event.stopPropagation()">
        <div class="sheet-handle"></div>
        <p style="font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:14px;">Menu Lainnya</p>
        <div class="more-grid" id="moreGrid"></div>
    </div>
</div>

<script>
const currentUser = JSON.parse(localStorage.getItem('currentUser')) || {};
if (!currentUser.user) window.location.href = 'index.html';

/* ── SIDEBAR ── */
function toggleSidebar() {
    const sb = document.getElementById('sidebar');
    const mc = document.getElementById('mainContent');
    sb.classList.toggle('collapsed');
    mc.classList.toggle('expanded');
    localStorage.setItem('sidebarState', sb.classList.contains('collapsed') ? 'small' : 'large');
}

function buildSidebar() {
    if (localStorage.getItem('sidebarState') === 'small') {
        document.getElementById('sidebar').classList.add('collapsed');
        document.getElementById('mainContent').classList.add('expanded');
    }
    const role = currentUser.role;
    const cur  = window.location.pathname.split('/').pop() || 'dashboard.html';
    const navItem = (icon, label, link) => {
        const active = cur === link ? 'active' : '';
        return `<button class="nav-item ${active}" onclick="location.href='${link}'">
            <span class="nav-icon">${icon}</span>
            <span class="nav-label">${label}</span>
        </button>`;
    };
    const PAGES_FRONTLINE = ['dashboard.html','history.html','stok.html','restock.html','laporan_staff.html'];
    const PAGES_MGMT      = ['rekap.html','produk.html'];
    const PAGES_EXEC      = ['laporan.html','statistik.html','bahan_baku.html','hpp_produk.html','belanja.html','warehouse.html'];
    const PAGES_VIP       = ['user.html','login_history.html'];
    const inGroup = pages => pages.includes(cur);
    const getOpen = (id) => {
        const s = localStorage.getItem('navGroup_' + id);
        return s !== null ? s === '1' : true;
    };
    const GROUP_ICONS = { frontline:'🛒', management:'📊', executive:'📋', vip:'👑' };
    const navGroup = (id, label, items, pages) => {
        const open      = getOpen(id);
        const hasActive = inGroup(pages);
        const icon      = GROUP_ICONS[id] || '📁';
        return `<div class="nav-group-wrap">
            <button class="nav-group-label${hasActive ? ' has-active' : ''}" onclick="toggleNavGroup('${id}')">
                <span class="nav-group-icon">${icon}</span>
                <span class="nav-group-text">${label}</span>
                <span class="nav-group-ti">${open ? '−' : '+'}</span>
            </button>
            <div class="nav-group-items" id="navg-${id}"${open ? '' : ' style="display:none"'}>
                ${items}
            </div>
        </div>`;
    };

    let frontline = navItem('🛒','Kasir','dashboard.html')
        + navItem('📄','History Transaksi','history.html')
        + navItem('📦','Stok Harian','stok.html')
        + navItem('🚚','Restock Barang','restock.html')
        + navItem('📊','Laporan Penjualan','laporan_staff.html');
    let h = navGroup('frontline', 'Frontline', frontline, PAGES_FRONTLINE);

    if (['Senior Staff','SPV','Owner','VIP'].includes(role)) {
        let mgmt = navItem('📈','Rekapan Penjualan','rekap.html')
            + navItem('🍱','Master Produk','produk.html');
        h += navGroup('management', 'Management', mgmt, PAGES_MGMT);
    }
    if (['Owner','VIP'].includes(role)) {
        let exec = navItem('📊','Keuangan Global','laporan.html')
            + navItem('📈','Statistik','statistik.html')
            + navItem('🧂','Bahan Baku','bahan_baku.html')
            + navItem('💰','HPP Produk','hpp_produk.html')
            + navItem('🏭','Warehouse','warehouse.html')
            + navItem('💸','Belanja','belanja.html');
        h += navGroup('executive', 'Executive', exec, PAGES_EXEC);
    }
    if (role === 'VIP') {
        let vip = navItem('👥','Manajemen User','user.html')
            + navItem('🔑','History Login','login_history.html');
        h += navGroup('vip', 'VIP Access', vip, PAGES_VIP);
    }
    document.getElementById('sidebarNav').innerHTML = h;
    const name = currentUser.fullName || currentUser.user || '?';
    document.getElementById('userAvatarInitial').innerText = name.charAt(0).toUpperCase();
    document.getElementById('sidebarUserName').innerText   = name;
    document.getElementById('sidebarUserRole').innerText   = currentUser.role || '—';
}

function toggleNavGroup(id) {
    const items = document.getElementById('navg-' + id);
    const btn   = items.previousElementSibling;
    const ti    = btn.querySelector('.nav-group-ti');
    const open  = items.style.display !== 'none';
    items.style.display = open ? 'none' : '';
    if (ti) ti.textContent = open ? '+' : '−';
    localStorage.setItem('navGroup_' + id, open ? '0' : '1');
}

/* ── CLOCK ── */
function updateClock() {
    const now = new Date();
    document.getElementById('realtimeClock').innerText = now.toLocaleTimeString('id-ID');
    document.getElementById('realtimeDate').innerText  = now.toLocaleDateString('id-ID',{weekday:'short',year:'numeric',month:'short',day:'numeric'});
}
setInterval(updateClock, 1000);

/* ── MORE MENU ── */
function buildMoreMenu() {
    const role = currentUser.role;
    const items = [{icon:'🚚',label:'Restock',link:'restock.html'}];
    if (['Senior Staff','SPV','Owner','VIP'].includes(role)) {
        items.push({icon:'🍱',label:'Produk',link:'produk.html'});
        items.push({icon:'📈',label:'Rekapan',link:'rekap.html'});
    }
    if (['Owner','VIP'].includes(role)) {
        items.push({icon:'🧂',label:'Bahan Baku',link:'bahan_baku.html'});
        items.push({icon:'💰',label:'HPP Produk',link:'hpp_produk.html'});
        items.push({icon:'🏭',label:'Warehouse',link:'warehouse.html'});
        items.push({icon:'💸',label:'Belanja',link:'belanja.html'});
        items.push({icon:'📊',label:'Keuangan',link:'laporan.html'});
        items.push({icon:'📈',label:'Statistik',link:'statistik.html'});
    }
    if (role === 'VIP') {
        items.push({icon:'👥',label:'Users',link:'user.html'});
        items.push({icon:'🔑',label:'Login Log',link:'login_history.html'});
    }
    items.push({icon:'🚪',label:'Logout',link:'#',action:'logout()'});
    document.getElementById('moreGrid').innerHTML = items.map(i =>
        `<button class="more-btn" onclick="${i.action||`location.href='${i.link}'`}">
            <span class="more-btn-icon">${i.icon}</span>
            <span class="more-btn-label">${i.label}</span>
        </button>`).join('');
}

function openSheet(id) { if(id==='moreSheet') buildMoreMenu(); document.getElementById(id).classList.add('open'); }
function closeSheetOutside(e,id) { if(e.target===document.getElementById(id)) document.getElementById(id).classList.remove('open'); }

/* ─────────────────────────────────────────────
   WAREHOUSE LOGIC
───────────────────────────────────────────── */

let selectedSKU = null;

/* ── CUSTOM DROPDOWN ── */
function toggleDropdownWH() {
    document.getElementById('wrapProdukWH').classList.toggle('open');
}

document.addEventListener('click', function(e) {
    const wrap = document.getElementById('wrapProdukWH');
    if (wrap && !wrap.contains(e.target)) wrap.classList.remove('open');
});

function pilihProdukWH(el) {
    document.getElementById('labelProdukWH').innerText = el.textContent.trim();
    document.querySelectorAll('#dropdownProdukWH .dropdown-item').forEach(i => i.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('wrapProdukWH').classList.remove('open');
    onProdukChange(el.dataset.id);
}

function sisaClass(sisa) {
    if (sisa < 0)  return 'danger';
    if (sisa < 10) return 'warn';
    return 'ok';
}

async function loadProdukList() {
    try {
        // Tarik daftar item yang pernah diaudit oleh staff
        const res = await fetch(`${API_BASE}?action=get_audit_items_master`);
        const list = await res.json().catch(() => []);

        const dropdown = document.getElementById('dropdownProdukWH');
        if (list.length === 0) {
            dropdown.innerHTML = `<div class="dropdown-item">Belum ada data audit dari cabang</div>`;
            return;
        }

        dropdown.innerHTML = list.map(p =>
            `<div class="dropdown-item" data-id="${p.nama}" onclick="pilihProdukWH(this)">${p.nama}</div>`
        ).join('');
    } catch(e) {
        console.error('loadProdukList:', e);
    }
}

function onProdukChange(id) {
    if (!id) {
        selectedSKU = null;
        document.getElementById('sisaBadge').style.display = 'none';
        document.getElementById('formCard').style.display  = 'none';
        document.getElementById('tableCard').style.display = 'none';
        return;
    }

    selectedSKU = id;
    document.getElementById('masukTgl').value     = new Date().toISOString().split('T')[0];
    document.getElementById('masukQty').value     = '';
    document.getElementById('masukCatatan').value = '';

    document.getElementById('formCard').style.display  = '';
    document.getElementById('tableCard').style.display = '';
    document.getElementById('sisaBadge').style.display = '';

    loadLedger(id);
}

async function loadLedger(namaItem) {
    const tbody = document.getElementById('ledgerTbody');
    tbody.innerHTML = `<tr><td class="wh-empty-td" colspan="6">⏳ Memuat...</td></tr>`;

    try {
        const res = await fetch(`${API_BASE}?action=get_warehouse_ledger&sku=${encodeURIComponent(namaItem)}`);
        const list = await res.json().catch(() => []);

        const sisa = list.length > 0 ? list[0].sisa : 0;
        const sisaEl = document.getElementById('sisaVal');
        sisaEl.textContent = list.length > 0 ? sisa : '—';
        sisaEl.className = `val ${sisaClass(sisa)}`;

        document.getElementById('ledgerCount').textContent = list.length > 0 ? `${list.length} entri` : '';

        if (list.length === 0) {
            tbody.innerHTML = `<tr><td class="wh-empty-td" colspan="6">📋 Belum ada riwayat stok.</td></tr>`;
            return;
        }

        tbody.innerHTML = list.map((r, i) => {
            const isLatest = i === 0;
            // Kita tambahkan tombol hapus di kolom terakhir
            // Gunakan r.id (pastikan di api.php menyertakan kolom ID)
            return `<tr${isLatest ? ' class="latest"' : ''}>
                <td><span class="mono">${r.tgl}</span></td>
                <td><small><b>${r.catatan}</b></small></td>
                <td><span class="mono val-masuk">${r.masuk > 0 ? '+' + r.masuk : '—'}</span></td>
                <td><span class="mono val-keluar">${r.keluar > 0 ? '-' + r.keluar : '—'}</span></td>
                <td><span class="mono val-${sisaClass(r.sisa)}">${r.sisa}</span></td>
                <td style="text-align:center;">
                    <button class="btn-hapus-icon" onclick="hapusLedger('${r.id}')" title="Hapus Data">🗑️</button>
                </td>
            </tr>`;
        }).join('');

    } catch(e) {
        console.error('loadLedger:', e);
        tbody.innerHTML = `<tr><td class="wh-empty-td" colspan="6">⚠️ Gagal memuat data.</td></tr>`;
    }
}

async function hapusLedger(id) {
    // Validasi Role: Hanya Owner/VIP yang bisa hapus riwayat gudang
    if (!['Owner', 'VIP'].includes(currentUser.role)) {
        return toast.error('Hanya Owner yang boleh menghapus riwayat stok!');
    }

    const ok = await showConfirm('Hapus riwayat stok ini? Sisa stok akan otomatis dihitung ulang.', 'Ya, Hapus', 'Batal', '🗑️');
    if (!ok) return;

    try {
        const res = await fetch(`${API_BASE}?action=delete_warehouse_ledger`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ id: id })
        });
        
        const hasil = await res.json();
        if (hasil.status === 'success') {
            toast.success('Data berhasil dihapus');
            loadLedger(selectedSKU); // Refresh tabel
        } else {
            toast.error('Gagal menghapus: ' + (hasil.message || 'error'));
        }
    } catch(e) {
        toast.error('Gagal koneksi ke server!');
    }
}

async function tambahMasuk() {
    if (!selectedSKU) return toast.warning('Pilih produk dulu!');

    const tgl     = document.getElementById('masukTgl').value;
    const qty     = parseFloat(document.getElementById('masukQty').value) || 0;
    const catatan = document.getElementById('masukCatatan').value.trim();

    if (!tgl)     return toast.warning('Tanggal wajib diisi!');
    if (qty <= 0) return toast.warning('Jumlah masuk harus lebih dari 0!');

    try {
        const res   = await fetch(`${API_BASE}?action=save_warehouse_masuk`, {
            method:  'POST',
            headers: {'Content-Type':'application/json'},
            body:    JSON.stringify({ sku: selectedSKU, tgl, masuk: qty, catatan })
        });
        const hasil = await res.json();
        if (hasil.status === 'success') {
            toast.success(`Stok masuk +${qty} berhasil disimpan!`);
            document.getElementById('masukQty').value     = '';
            document.getElementById('masukCatatan').value = '';
            loadLedger(selectedSKU);
        } else {
            toast.error('Gagal: ' + (hasil.message || 'error'));
        }
    } catch(e) {
        toast.error('Gagal koneksi server!');
    }
}

async function logout() {
    const ok = await showConfirm('Logout dari sistem?', 'Ya, Logout', 'Batal', '🚪');
    if (ok) {
        localStorage.removeItem('currentUser');
        localStorage.removeItem('cabangHoki');
        window.location.href = 'index.html';
    }
}

window.onload = () => {
    buildSidebar();
    updateClock();
    loadProdukList();
    setInterval(() => { if (selectedSKU) loadLedger(selectedSKU); }, 30000);
};
</script>
